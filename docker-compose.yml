services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tce
      POSTGRES_PASSWORD: tce
      POSTGRES_DB: tce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  pgdata:
