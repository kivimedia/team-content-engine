function _renderScriptDetailInto(container, script, opts) {
  const kind = (opts && opts.kind) || script.kind || 'walking';
  const isArchived = script.status === 'archived';

  // === HEADER: title, meta, top-right action cluster ===
  const head = document.createElement('div');
  head.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px';
  const headLeft = document.createElement('div');
  headLeft.style.cssText = 'flex:1;min-width:280px';
  const title = document.createElement('h2');
  title.textContent = script.title || '(Untitled)';
  title.style.cssText = 'margin:0 0 4px 0';
  if (isArchived) title.style.opacity = '0.5';
  headLeft.appendChild(title);
  const meta = document.createElement('div');
  meta.style.cssText = 'font-size:12px;color:var(--dim)';
  const dur = script.estimated_duration_seconds ? Math.round(script.estimated_duration_seconds) + 's' : '?s';
  const statusBadge = script.status ? script.status.toUpperCase() : 'DRAFT';
  meta.textContent = [statusBadge, dur, (script.word_count ? script.word_count + ' words' : ''), script.niche, script.hook_formula ? 'formula ' + script.hook_formula : ''].filter(Boolean).join(' | ');
  headLeft.appendChild(meta);
  head.appendChild(headLeft);

  // Top-right action cluster: Copy Script (prominent), Copy Hook, Edit, Archive
  const actionsRow = document.createElement('div');
  actionsRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;align-items:center';
  const mkBtn = (label, cls, onClick, title) => {
    const b = document.createElement('button');
    b.className = cls;
    b.style.cssText = 'font-size:12px;padding:6px 12px';
    b.textContent = label;
    if (title) b.title = title;
    b.onclick = onClick;
    return b;
  };
  actionsRow.appendChild(mkBtn('Copy Script', 'btn btn-primary', () => {
    // clipCopy handles HTTPS (navigator.clipboard) + HTTP fallback
    // (textarea + execCommand). Dashboard runs on HTTP so direct clipboard
    // API would fail - this helper already exists in the codebase.
    clipCopy(script.full_script || '');
    toast('Script copied to clipboard');
  }, 'Copy the full teleprompter script'));
  if (script.hook) {
    actionsRow.appendChild(mkBtn('Copy Hook', 'btn btn-dim', () => {
      clipCopy(script.hook || '');
      toast('Hook copied');
    }, 'Copy just the opening hook'));
  }
  actionsRow.appendChild(mkBtn('Email', 'btn btn-dim', async (ev) => {
    // Server-side send via `gws` on the VPS. Recipient is fixed in the
    // backend (ravivziv@gmail.com) - no caller-controlled recipient field.
    const btn = ev && ev.currentTarget;
    const original = btn ? btn.textContent : null;
    if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
    try {
      const kindPath = (script.kind === 'walking') ? 'walking' : 'talking_head';
      const res = await fetch(`/api/v1/video-scripts/${kindPath}/${script.id}/email`, { method: 'POST' });
      if (!res.ok) {
        const err = await res.text().catch(() => '');
        throw new Error(err || `HTTP ${res.status}`);
      }
      const data = await res.json().catch(() => ({}));
      toast('Email sent to ravivziv@gmail.com' + (data.gmail_message_id ? ' (id: ' + String(data.gmail_message_id).slice(0, 8) + ')' : ''));
    } catch (e) {
      toast('Email failed: ' + (e && e.message ? e.message : 'unknown'));
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = original || 'Email'; }
    }
  }, 'Send the script to ravivziv@gmail.com via Gmail API'));
  actionsRow.appendChild(mkBtn('Edit', 'btn btn-dim', () => {
    // Toggle edit mode on the teleprompter below
    const tele = container.querySelector('[data-role="teleprompter"]');
    const editBox = container.querySelector('[data-role="tele-editor"]');
    const saveBtn = container.querySelector('[data-role="tele-save"]');
    const cancelBtn = container.querySelector('[data-role="tele-cancel"]');
    if (!tele || !editBox) return;
    if (editBox.style.display === 'none') {
      editBox.value = script.full_script || '';
      editBox.style.display = '';
      tele.style.display = 'none';
      if (saveBtn) saveBtn.style.display = '';
      if (cancelBtn) cancelBtn.style.display = '';
      editBox.focus();
    }
  }, 'Edit the script inline'));
  if (!isArchived) {
    actionsRow.appendChild(mkBtn('Archive', 'btn btn-dim', async () => {
      if (!confirm('Archive this script? It will stay in the database but won\'t show in the default library view.')) return;
      try {
        await api('/video-scripts/' + kind + '/' + script.id, { method: 'PATCH', body: JSON.stringify({ status: 'archived' }) });
        toast('Archived');
        script.status = 'archived';
        _openScriptDetail(kind, script.id); // re-render detail
      } catch(e) { toast('Failed: ' + e.message, false); }
    }, 'Soft-delete this script'));
  } else {
    actionsRow.appendChild(mkBtn('Unarchive', 'btn btn-dim', async () => {
      try {
        await api('/video-scripts/' + kind + '/' + script.id, { method: 'PATCH', body: JSON.stringify({ status: 'draft' }) });
        toast('Unarchived');
        script.status = 'draft';
        _openScriptDetail(kind, script.id);
      } catch(e) { toast('Failed: ' + e.message, false); }
    }));
  }
  head.appendChild(actionsRow);
  container.appendChild(head);

  // === STATUS TRANSITIONS (approved / recorded / published / rejected) ===
  const statusRow = document.createElement('div');
  statusRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;color:var(--dim);align-items:center';
  const statusLabel = document.createElement('span');
  statusLabel.textContent = 'Mark as:';
  statusLabel.style.marginRight = '4px';
  statusRow.appendChild(statusLabel);
  ['approved', 'recorded', 'edited', 'published', 'rejected'].forEach(st => {
    const b = document.createElement('button');
    b.className = 'btn btn-dim';
    b.style.cssText = 'font-size:11px;padding:4px 10px';
    b.textContent = st;
    b.onclick = async () => {
      try {
        const body = { status: st };
        // Recorded + Edited prompt for the footage URL so TCE tracks what
        // the operator actually produced. Skip if the script already has
        // the field set (let them re-open the URL without re-prompting).
        if (st === 'recorded') {
          const current = script.video_file_path || '';
          const url = prompt('Paste the raw recording URL (Drive/Dropbox/path):', current);
          if (url === null) return; // cancel
          if (url.trim()) body.video_file_path = url.trim();
        } else if (st === 'edited') {
          const current = script.edited_video_file_path || '';
          const url = prompt('Paste the CutSense-edited video URL:', current);
          if (url === null) return;
          if (url.trim()) body.edited_video_file_path = url.trim();
        }
        await api('/video-scripts/' + kind + '/' + script.id, { method: 'PATCH', body: JSON.stringify(body) });
        toast('Status: ' + st);
        script.status = st;
        _openScriptDetail(kind, script.id);
      } catch(e) { toast('Failed: ' + e.message, false); }
    };
    statusRow.appendChild(b);
  });
  container.appendChild(statusRow);

  // === UPLOAD ROW: drop the raw recording / CutSense output directly ===
  // Walking-only for now: operator records on phone, drops the mp4 here,
  // and TCE stores it on disk at /media/walking_scripts/{id}/ so the
  // Footage card gets a real URL without manual Drive upload + URL paste.
  if (kind === 'walking') {
    const uploadRow = document.createElement('div');
    uploadRow.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:var(--dim);align-items:center';
    const upLabel = document.createElement('span');
    upLabel.textContent = 'Upload:';
    upLabel.style.marginRight = '4px';
    uploadRow.appendChild(upLabel);
    const mkUploadBtn = (label, which, setsField, setsStatus) => {
      const wrap = document.createElement('label');
      wrap.className = 'btn btn-dim';
      wrap.style.cssText = 'font-size:11px;padding:4px 10px;cursor:pointer;display:inline-block';
      wrap.textContent = label;
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'video/*,.mp4,.mov,.m4v,.webm';
      input.style.display = 'none';
      wrap.appendChild(input);
      input.onchange = async () => {
        const f = input.files && input.files[0];
        if (!f) return;
        const sizeMB = (f.size / 1048576).toFixed(1);
        const useChunked = f.size > 100 * 1024 * 1024; // > 100 MB -> chunked
        wrap.textContent = 'Uploading 0/' + sizeMB + 'MB...';
        wrap.style.pointerEvents = 'none';
        const onProgress = (p) => {
          wrap.textContent = (p.bytesSent / 1048576).toFixed(0) + '/' + sizeMB + 'MB (' + p.percent.toFixed(0) + '%)';
        };
        try {
          let data;
          if (useChunked) {
            const intent = which === 'raw' ? 'walking_raw' : 'walking_edited';
            data = await uploadFileChunked(f, intent, script.id, { onProgress });
          } else {
            data = await uploadFileXhr(
              '/api/v1/video-scripts/walking/' + script.id + '/upload-' + which,
              f,
              { onProgress }
            );
          }
          toast('Uploaded ' + which + ' (' + sizeMB + 'MB). Status: ' + (data.status || setsStatus));
          _openScriptDetail(kind, script.id);
        } catch(e) {
          toast('Upload failed: ' + (e.message || 'unknown'), false);
          wrap.textContent = label;
          wrap.style.pointerEvents = '';
          wrap.appendChild(input);
        }
      };
      return wrap;
    };
    uploadRow.appendChild(mkUploadBtn('Raw recording', 'raw', 'video_file_path', 'recorded'));
    uploadRow.appendChild(mkUploadBtn('CutSense output', 'edited', 'edited_video_file_path', 'edited'));
    const hint = document.createElement('span');
    hint.style.cssText = 'font-size:10px;color:var(--dim);margin-left:8px;opacity:0.7';
    hint.textContent = 'mp4/mov/m4v/webm, 3 GB max (chunked upload for >100 MB)';
    uploadRow.appendChild(hint);
    container.appendChild(uploadRow);
  }

  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start';

  // === LEFT: teleprompter + edit textarea (hidden by default) + save/cancel ===
  const teleWrap = document.createElement('div');
  teleWrap.style.cssText = 'display:flex;flex-direction:column;gap:8px';
  const tele = document.createElement('div');
  tele.className = 'card';
  tele.setAttribute('data-role', 'teleprompter');
  tele.style.cssText = 'padding:20px 24px;font-size:18px;line-height:1.7;color:var(--text);white-space:pre-wrap;max-height:600px;overflow:auto';
  tele.textContent = script.full_script || '(empty script)';
  teleWrap.appendChild(tele);
  const editBox = document.createElement('textarea');
  editBox.setAttribute('data-role', 'tele-editor');
  editBox.style.cssText = 'display:none;width:100%;min-height:400px;padding:16px 20px;font-size:16px;line-height:1.6;background:var(--card);color:var(--text);border:1px solid var(--accent);border-radius:8px;resize:vertical;font-family:inherit';
  teleWrap.appendChild(editBox);
  const editActions = document.createElement('div');
  editActions.style.cssText = 'display:flex;gap:6px';
  const saveEditBtn = document.createElement('button');
  saveEditBtn.className = 'btn btn-primary';
  saveEditBtn.setAttribute('data-role', 'tele-save');
  saveEditBtn.style.cssText = 'display:none;font-size:12px;padding:6px 14px';
  saveEditBtn.textContent = 'Save Script';
  saveEditBtn.onclick = async () => {
    const newText = editBox.value;
    try {
      await api('/video-scripts/' + kind + '/' + script.id, { method: 'PATCH', body: JSON.stringify({ full_script: newText }) });
      toast('Script saved');
      script.full_script = newText;
      tele.textContent = newText;
      tele.style.display = '';
      editBox.style.display = 'none';
      saveEditBtn.style.display = 'none';
      cancelEditBtn.style.display = 'none';
    } catch(e) { toast('Save failed: ' + e.message, false); }
  };
  const cancelEditBtn = document.createElement('button');
  cancelEditBtn.className = 'btn btn-dim';
  cancelEditBtn.setAttribute('data-role', 'tele-cancel');
  cancelEditBtn.style.cssText = 'display:none;font-size:12px;padding:6px 14px';
  cancelEditBtn.textContent = 'Cancel';
  cancelEditBtn.onclick = () => {
    editBox.style.display = 'none';
    tele.style.display = '';
    saveEditBtn.style.display = 'none';
    cancelEditBtn.style.display = 'none';
  };
  editActions.appendChild(saveEditBtn);
  editActions.appendChild(cancelEditBtn);
  teleWrap.appendChild(editActions);
  grid.appendChild(teleWrap);
  // RIGHT: shot notes + cutsense
  const side = document.createElement('div');
  side.style.cssText = 'display:flex;flex-direction:column;gap:12px';
  // Strategic justification + personal anchor cards
  if (kind === 'walking' && (script.strategic_justification || script.personal_anchor)) {
    const jc = document.createElement('div');
    jc.className = 'card';
    jc.style.cssText = 'padding:12px 14px;border-left:3px solid var(--accent)';
    if (script.strategic_justification) {
      const jH = document.createElement('div');
      jH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px';
      jH.textContent = 'Why this topic';
      jc.appendChild(jH);
      const jT = document.createElement('div');
      jT.style.cssText = 'font-size:13px;line-height:1.55;color:var(--text);margin-bottom:8px';
      jT.textContent = script.strategic_justification;
      jc.appendChild(jT);
    }
    if (script.personal_anchor) {
      const pH = document.createElement('div');
      pH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px';
      pH.textContent = 'Personal angle';
      jc.appendChild(pH);
      const pT = document.createElement('div');
      pT.style.cssText = 'font-size:13px;line-height:1.55;color:var(--accent)';
      pT.textContent = script.personal_anchor;
      jc.appendChild(pT);
    }
    side.appendChild(jc);
  }

  if (kind === 'walking' && script.shot_notes) {
    const sn = document.createElement('div');
    sn.className = 'card';
    sn.style.cssText = 'padding:12px 14px';
    const snH = document.createElement('div');
    snH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
    snH.textContent = 'Shot notes';
    sn.appendChild(snH);
    const sl = document.createElement('ul');
    sl.style.cssText = 'margin:0;padding-left:18px;font-size:13px;line-height:1.6';
    for (const [k, v] of Object.entries(script.shot_notes || {})) {
      const li = document.createElement('li');
      li.textContent = k + ': ' + v;
      sl.appendChild(li);
    }
    sn.appendChild(sl);
    side.appendChild(sn);
  }
  // === FOOTAGE CARD: raw recording + edited CutSense output links ===
  if (kind === 'walking' && (script.video_file_path || script.edited_video_file_path)) {
    const fg = document.createElement('div');
    fg.className = 'card';
    fg.style.cssText = 'padding:12px 14px';
    const fgH = document.createElement('div');
    fgH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
    fgH.textContent = 'Footage';
    fg.appendChild(fgH);
    const mkRow = (label, url) => {
      const row = document.createElement('div');
      row.style.cssText = 'font-size:12px;margin-bottom:6px;line-height:1.4';
      const lbl = document.createElement('span');
      lbl.textContent = label + ': ';
      lbl.style.color = 'var(--dim)';
      row.appendChild(lbl);
      // Absolute URLs AND our /media/* served paths are both clickable.
      // Other paths (bare filesystem) render as plain text.
      if (/^(https?:\/\/|\/media\/)/i.test(url)) {
        const a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener';
        a.textContent = url.length > 60 ? url.slice(0, 60) + '...' : url;
        a.style.color = 'var(--accent)';
        row.appendChild(a);
      } else {
        const span = document.createElement('span');
        span.textContent = url;
        row.appendChild(span);
      }
      return row;
    };
    if (script.video_file_path) fg.appendChild(mkRow('Raw', script.video_file_path));
    if (script.edited_video_file_path) fg.appendChild(mkRow('Edited', script.edited_video_file_path));
    side.appendChild(fg);
  }
  if (kind === 'walking' && script.cutsense_prompt) {
    const cs = document.createElement('div');
    cs.className = 'card';
    cs.style.cssText = 'padding:12px 14px';
    const csH = document.createElement('div');
    csH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
    csH.textContent = 'CutSense handoff';
    cs.appendChild(csH);
    // If we already have a recorded URL, substitute it into the CLI so the
    // operator can copy-paste a ready-to-run command instead of replacing
    // $VIDEO_PATH themselves.
    const videoArg = script.video_file_path || '$VIDEO_PATH';
    const cliText = 'cutsense run ' + JSON.stringify(videoArg) + ' --prompt ' + JSON.stringify(script.cutsense_prompt) + ' --captions jumbo --duration ' + (script.estimated_duration_seconds || script.duration_target_seconds || 90) + ' --silence 1.0';
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:var(--bg);padding:10px;border-radius:4px;font-size:11px;overflow:auto;max-height:140px;margin:0 0 8px 0;white-space:pre-wrap;word-break:break-all';
    pre.textContent = cliText;
    cs.appendChild(pre);
    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn btn-primary';
    copyBtn.style.cssText = 'font-size:12px';
    copyBtn.textContent = 'Copy CutSense CLI';
    copyBtn.onclick = () => {
      clipCopy(cliText);
      toast(script.video_file_path ? 'Copied, ready to run.' : 'Copied. Replace $VIDEO_PATH with your recorded file.');
    };
    cs.appendChild(copyBtn);
    const help = document.createElement('div');
    help.style.cssText = 'font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5';
    help.textContent = script.video_file_path
      ? 'CLI already points at your recorded file. Paste into terminal after downloading, then Mark as edited with the CutSense output URL.'
      : 'After you record the walking video on your phone, airdrop or scp it to your laptop, replace $VIDEO_PATH with the absolute file path, and run.';
    cs.appendChild(help);
    side.appendChild(cs);
  }
  if (script.repurpose && (script.repurpose.fb_caption_draft || script.repurpose.li_caption_draft)) {
    const rp = document.createElement('div');
    rp.className = 'card';
    rp.style.cssText = 'padding:12px 14px';
    const rpH = document.createElement('div');
    rpH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
    rpH.textContent = 'Repurpose drafts';
    rp.appendChild(rpH);
    if (script.repurpose.fb_caption_draft) {
      const fb = document.createElement('div');
      fb.style.cssText = 'font-size:12px;margin-bottom:8px';
      fb.textContent = 'FB: ' + script.repurpose.fb_caption_draft;
      rp.appendChild(fb);
    }
    if (script.repurpose.li_caption_draft) {
      const li = document.createElement('div');
      li.style.cssText = 'font-size:12px';
      li.textContent = 'LI: ' + script.repurpose.li_caption_draft;
      rp.appendChild(li);
    }
    side.appendChild(rp);
  }

  // === CONTEXT PANEL: what the planner + strategist gave the writer ===
  const ctx = document.createElement('div');
  ctx.className = 'card';
  ctx.style.cssText = 'padding:12px 14px';
  const ctxH = document.createElement('div');
  ctxH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
  ctxH.textContent = 'Context used for generation';
  ctx.appendChild(ctxH);
  const rows = [
    ['Topic', script.topic],
    ['Thesis', script.thesis],
    ['Audience', script.target_audience],
    ['Hook formula', script.hook_formula],
    ['Niche', script.niche],
    ['Duration target', script.duration_target_seconds ? script.duration_target_seconds + 's' : null],
    ['Est. duration', script.estimated_duration_seconds ? script.estimated_duration_seconds + 's' : null],
    ['SEO description', script.seo_description],
  ];
  for (const [k, v] of rows) {
    if (!v) continue;
    const row = document.createElement('div');
    row.style.cssText = 'font-size:12px;margin-bottom:6px;line-height:1.5';
    const kEl = document.createElement('div');
    kEl.style.cssText = 'color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1px';
    kEl.textContent = k;
    row.appendChild(kEl);
    const vEl = document.createElement('div');
    vEl.style.color = 'var(--text)';
    vEl.textContent = v;
    row.appendChild(vEl);
    ctx.appendChild(row);
  }
  if (Array.isArray(script.tags) && script.tags.length) {
    const tagRow = document.createElement('div');
    tagRow.style.cssText = 'font-size:12px;margin-top:8px';
    const tagH = document.createElement('div');
    tagH.style.cssText = 'color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px';
    tagH.textContent = 'Tags';
    tagRow.appendChild(tagH);
    const tagBox = document.createElement('div');
    tagBox.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px';
    script.tags.forEach(t => {
      const chip = document.createElement('span');
      chip.style.cssText = 'background:var(--bg);color:var(--dim);padding:2px 8px;border-radius:10px;font-size:11px';
      chip.textContent = t;
      tagBox.appendChild(chip);
    });
    tagRow.appendChild(tagBox);
    ctx.appendChild(tagRow);
  }
  side.appendChild(ctx);

  // === FEEDBACK panel: operator notes ("tune this next time") ===
  const fb = document.createElement('div');
  fb.className = 'card';
  fb.style.cssText = 'padding:12px 14px';
  const fbH = document.createElement('div');
  fbH.style.cssText = 'font-weight:600;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px';
  fbH.textContent = 'Operator feedback';
  fb.appendChild(fbH);
  const fbHelp = document.createElement('div');
  fbHelp.style.cssText = 'font-size:11px;color:var(--dim);margin-bottom:6px;line-height:1.4';
  fbHelp.textContent = 'Notes for future runs: what worked, what to tune, approval rationale. Saved on the script - not sent as input to agents automatically.';
  fb.appendChild(fbHelp);
  const fbBox = document.createElement('textarea');
  fbBox.style.cssText = 'width:100%;min-height:80px;padding:8px 10px;font-size:12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;resize:vertical;font-family:inherit';
  fbBox.placeholder = 'e.g. "Hook was too hedged - next time push the stakes harder" or "Perfect as-is, approved for Wed"';
  fbBox.value = script.operator_feedback || '';
  fb.appendChild(fbBox);
  const fbActions = document.createElement('div');
  fbActions.style.cssText = 'display:flex;justify-content:flex-end;margin-top:6px';
  const fbSave = document.createElement('button');
  fbSave.className = 'btn btn-dim';
  fbSave.style.cssText = 'font-size:11px;padding:4px 12px';
  fbSave.textContent = 'Save feedback';
  fbSave.onclick = async () => {
    try {
      await api('/video-scripts/' + kind + '/' + script.id, { method: 'PATCH', body: JSON.stringify({ operator_feedback: fbBox.value }) });
      script.operator_feedback = fbBox.value;
      toast('Feedback saved');
    } catch(e) { toast('Save failed: ' + e.message, false); }
  };
  fbActions.appendChild(fbSave);
  fb.appendChild(fbActions);
  side.appendChild(fb);

  grid.appendChild(side);
  container.appendChild(grid);
}

// Unified Start tab - one entry point for Topic / Repo / Copy.
// Sub-tabs persist via localStorage + infer from legacy currentTab aliases
// so anything that used to set currentTab='topic' still lands users on
// the right sub-form inside the unified view.
async function renderStartFromSomething() {
  const app = document.getElementById('app');
  if (!app) return;
  let sub = localStorage.getItem('tce_start_subtab');
  if (!sub) sub = currentTab === 'repo' ? 'repo' : currentTab === 'copy' ? 'copy' : 'topic';
  const pills = ['topic','repo','copy','library'].map(t => {
    const active = t === sub;
    const lbl = t === 'topic' ? 'Topic (describe angle)' : t === 'repo' ? 'Repo (GitHub URL)' : t === 'copy' ? 'Copy (polish draft)' : '&#128218; Library';
    const isLib = t === 'library';
    return '<button onclick="switchStartSubtab(&quot;' + t + '&quot;)" style="padding:10px 22px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:' + (active ? (isLib ? '#2a5298' : 'var(--accent)') : 'var(--card)') + ';color:' + (active ? '#fff' : (isLib ? 'var(--accent)' : 'var(--dim)')) + ';transition:all 0.15s">' + lbl + '</button>';
  }).join('');
  app.innerHTML = `
    <div class="section" style="padding-bottom:0">
      <h2 style="margin-bottom:4px">Start from Something</h2>
      <p style="font-size:13px;color:var(--dim);margin:0 0 14px 0">Three starting points for the content pipeline. Pick what you have:</p>
      <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden">${pills}</div>
    </div>
    <div id="start-content"></div>`;
  await _renderStartSubContent(sub);
}

async function switchStartSubtab(sub) {
  localStorage.setItem('tce_start_subtab', sub);
  currentTab = 'start';
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'start'));
  await renderStartFromSomething();
}

async function _renderStartSubContent(sub) {
  const c = document.getElementById('start-content');
  if (!c) return;
  if (sub === 'topic') await renderTopic(c);
  else if (sub === 'repo') await renderRepo(c);
  else if (sub === 'library') await _renderStartLibrary(c);
  else _renderCopyFormInto(c);
}

async function _renderStartLibrary(container) {
  container.innerHTML = '<div class="section"><div class="empty">Loading past runs...</div></div>';
  try {
    const pkgs = await api('/content/packages');
    const somethingSources = new Set(['topic', 'repo', 'copy']);
    const items = pkgs.filter(p => somethingSources.has(p.source)).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    if (!items.length) {
      container.innerHTML = '<div class="section"><div class="empty">No past runs yet. Use Topic, Repo, or Copy to create your first package.</div></div>';
      return;
    }
    const srcIcon = s => s === 'topic' ? '&#128172;' : s === 'repo' ? '&#128640;' : '&#128203;';
    const srcLabel = s => s === 'topic' ? 'Topic' : s === 'repo' ? 'Repo' : 'Copy';
    const qaColor = q => q === 'pass' ? '#00e676' : q === 'conditional' ? '#ffb74d' : q === 'fail' ? '#ef5350' : 'var(--dim)';
    let html = '<div class="section"><h2 style="margin-bottom:4px">Library</h2>';
    html += '<p style="font-size:13px;color:var(--dim);margin:0 0 16px 0">All past Start from Something runs - ' + items.length + ' package' + (items.length !== 1 ? 's' : '') + '</p>';
    html += '<div style="display:flex;flex-direction:column;gap:10px">';
    for (const p of items) {
      const date = new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      // Server computes p.title for repo (repo name), topic (brief topic), and
      // copy (snippet) sources. Fallback chain handles older packages or future sources.
      const topic = p.title || p.topic || p.angle || p.repo_url || p.copy_snippet || '(no title)';
      const shortTopic = topic.length > 80 ? topic.substring(0, 80) + '...' : topic;
      const qa = p.qa_score != null ? p.qa_score.toFixed(1) : null;
      html += '<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="viewPackage(\'' + p.id + '\',null)">';
      html += '<span style="font-size:20px">' + srcIcon(p.source) + '</span>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + shortTopic + '</div>';
      html += '<div style="font-size:11px;color:var(--dim);margin-top:3px">' + srcLabel(p.source) + ' &middot; ' + date + (qa ? ' &middot; QA <span style="color:' + qaColor(p.qa_band) + '">' + qa + '</span>' : '') + '</div>';
      html += '</div>';
      if (p.source === 'repo' && p.repo_url) {
        html += '<a href="' + p.repo_url + '" target="_blank" rel="noopener" class="btn btn-dim" style="font-size:11px;padding:4px 10px;white-space:nowrap;text-decoration:none" onclick="event.stopPropagation()">View Repo &#8599;</a>';
      }
      html += '<button class="btn btn-dim" style="font-size:11px;padding:4px 10px;white-space:nowrap" onclick="event.stopPropagation();viewPackage(\'' + p.id + '\',null)">View Package</button>';
      html += '</div>';
    }
    html += '</div></div>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="section"><div class="empty">Failed to load library: ' + e.message + '</div></div>';
  }
}

async function runTopicGuide() {
  const topicText = document.getElementById('topic-text')?.value?.trim();
  if (!topicText) { toast('Please describe your topic first', false); return; }
  const ctaKw = document.getElementById('topic-cta')?.value?.trim() || 'guide';
  const notes = document.getElementById('topic-notes')?.value?.trim() || null;
  const btn = document.getElementById('topic-run-btn');
  btn.disabled = true; btn.textContent = 'Starting guide generation...';
  try {
    const body = { post_text: topicText, cta_keyword: ctaKw };
    if (notes) body.operator_feedback = notes;
    const r = await api('/content/guides/generate-from-post', { method: 'POST', body: JSON.stringify(body) });
    _regenState = { guideId: r.tracking_id, startTime: Date.now(), feedback: notes, fromPost: true };
    toast('Guide generation started');
    pollRegenStatus(r.tracking_id);
    btn.disabled = false; btn.textContent = 'Generate Guide';

    toast('Failed: ' + e.message, false);

async function runTopicPipeline() {
  const topicText = document.getElementById('topic-text')?.value?.trim();
  if (!topicText) { toast('Please describe your topic first', false); return; }
  const creatorId = document.getElementById('topic-creator')?.value || null;
  const postId = document.getElementById('topic-post')?.value || null;
  const ctaKw = document.getElementById('topic-cta')?.value?.trim() || null;
  const templateHint = document.getElementById('topic-template')?.value?.trim() || null;
  const notes = document.getElementById('topic-notes')?.value?.trim() || null;

  const body = { topic: topicText };
  if (creatorId) body.inspire_by_creator_ids = [creatorId];
  if (postId) body.inspire_by_post_id = postId;
  if (ctaKw) body.cta_keyword = ctaKw;
  if (templateHint) body.template_hint = templateHint;
  if (notes) body.notes = notes;
  body.language = 'english';

  const btn = document.getElementById('topic-run-btn');
  btn.disabled = true; btn.textContent = 'Starting...';
  topicStartTime = Date.now();
  localStorage.setItem('tce_topic_start', topicStartTime);

  try {
    const r = await api('/pipeline/start-from-topic', { method: 'POST', body: JSON.stringify(body) });
    topicRunId = r.run_id;
    localStorage.setItem('tce_topic_run', r.run_id);
    toast('Pipeline started: ' + r.run_id.substring(0, 8));
    pollTopicStatus();
    if (topicPollInterval) clearInterval(topicPollInterval);
    topicPollInterval = setInterval(pollTopicStatus, 3000);
  } catch (e) {
    toast('Failed: ' + e.message, false);
    btn.disabled = false; btn.textContent = 'Generate from Topic';
  }
}

async function pollTopicStatus() {
  if (!topicRunId) return;
  const statusEl = document.getElementById('topic-status');
  const resultEl = document.getElementById('topic-result');
  const elapsedEl = document.getElementById('topic-elapsed');
  const btn = document.getElementById('topic-run-btn');
  if (!statusEl) return;

  // Update elapsed
  if (elapsedEl && topicStartTime) {
    const secs = Math.floor((Date.now() - topicStartTime) / 1000);
    const m = Math.floor(secs / 60); const s = secs % 60;
    elapsedEl.textContent = m > 0 ? m + 'm ' + s + 's' : s + 's';
  }

  try {
    const d = await api('/pipeline/start-from-topic/' + topicRunId + '/status');
    // Build step progress
    const steps = d.step_status || {};
    const stepNames = ['trend_scout','story_strategist','research_agent','facebook_writer','linkedin_writer','cta_agent','creative_director','qa_agent'];
    const stepLabels = { trend_scout:'Trend Scout', story_strategist:'Story Strategist', research_agent:'Research', facebook_writer:'FB Writer', linkedin_writer:'LI Writer', cta_agent:'CTA Agent', creative_director:'Creative Director', qa_agent:'QA Agent' };
    let activeStepLabel = '';
    let html = '<div class="card" style="padding:12px 16px"><div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary)">Pipeline Progress</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    for (const sn of stepNames) {
      const st = steps[sn] || 'pending';
      let bg = 'var(--muted)'; let fg = 'var(--dim)';
      if (st === 'completed') { bg = 'var(--success-dim)'; fg = 'var(--success)'; }
      else if (st === 'running') { bg = 'var(--primary-dim)'; fg = 'var(--primary)'; activeStepLabel = stepLabels[sn] || sn; }
      else if (st === 'error' || st === 'failed') { bg = 'var(--destructive-dim)'; fg = 'var(--destructive)'; }
      html += '<span style="display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;background:' + bg + ';color:' + fg + '">' + (stepLabels[sn]||sn) + (st==='running'?' ...':'') + (st==='completed'?' &#10003;':'') + (st==='error'||st==='failed'?' &#10007;':'') + '</span>';
    }
    html += '</div>';
    var liveHtml = '';
    if (d.phase_detail && d.status === 'running') {
      liveHtml += '<div style="margin-top:8px;font-size:12px;color:var(--primary);display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 1.5s infinite"></span>' + esc(d.phase_detail) + '</div>';
    }
    var stepLogs = d.step_logs || {};
    for (var si = 0; si < stepNames.length; si++) {
      var sn2 = stepNames[si];
      if (steps[sn2] === 'running' && stepLogs[sn2] && stepLogs[sn2].length > 0) {
        liveHtml += '<div style="margin-top:4px;font-size:11px;color:var(--dim);font-style:italic;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(stepLogs[sn2][stepLogs[sn2].length - 1]) + '</div>';
        break;
      }
    }
    html += liveHtml;
    if (d.error) html += '<div style="color:var(--destructive);margin-top:8px;font-size:12px">Error: ' + esc(d.error) + '</div>';
    html += '</div>';
    statusEl.textContent = '';
    statusEl.insertAdjacentHTML('afterbegin', html);
    if (btn && d.status === 'running' && activeStepLabel) {
      btn.textContent = 'Running: ' + activeStepLabel + '...';
    }

    if (d.status === 'completed' || d.status === 'error' || d.status === 'failed') {
      if (topicPollInterval) { clearInterval(topicPollInterval); topicPollInterval = null; }
      localStorage.removeItem('tce_topic_run');
      localStorage.removeItem('tce_topic_start');
      if (btn) { btn.disabled = false; btn.textContent = 'Generate from Topic'; }

      if (d.status === 'completed') {
        toast('Topic pipeline completed!');
        // Fetch the latest package
        try {
          const pkgs = await api('/content/packages?limit=1');
          if (pkgs && pkgs.length > 0) {
            const pkg = pkgs[0];
            let topicHdr = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
            topicHdr += '<span style="color:var(--green);font-weight:600;font-size:15px">Package created!</span>';
            topicHdr += '<button class="btn btn-dim" style="font-size:11px" onclick="openBrainstorm(\'' + pkg.id + '\')">Brainstorm</button>';
            topicHdr += '<button class="btn btn-blue" style="font-size:11px" onclick="switchTab(\'\1\')">View in Packages</button>';
            topicHdr += '</div>';
            if (resultEl) resultEl.innerHTML = topicHdr + _renderPkgCard(pkg);
            loadSourceHistory('topic', 'topic-history');
          }
        } catch {}
      } else {
        toast('Pipeline failed: ' + (d.error || 'unknown error'), false);
      }
    }
  } catch (e) {
    statusEl.innerHTML = '<div class="card" style="color:var(--dim)">Checking status...</div>';
  }
}

  if (activePipelineRun) { pollPipeline(); if(!pollInterval) pollInterval = setInterval(pollPipeline, 3000); }
  updateWfDesc();
}

// Track which agent sections are expanded (auto-expand running ones)
let expandedSteps = {};
let pipelineInitialized = false;
let prevLogCounts = {};

function formatLogLine(raw) {
  // Parse "[HH:MM:SS] message" into pretty format
  const m = raw.match(/^\[(\d{2}:\d{2}:\d{2})\]\s*(.*)$/);
  if (!m) return '<div style="padding:4px 0 4px 8px;color:var(--text);font-size:13px;line-height:1.5">' + esc(raw) + '</div>';
  const time = m[1];
  let msg = m[2];
  // Highlight key patterns
  let color = 'var(--text)';
  let icon = '';
  if (msg.startsWith('Starting')) { icon = '▶ '; color = 'var(--blue)'; }
  else if (msg.startsWith('Done') || msg.startsWith('Total')) { icon = '✓ '; color = 'var(--green)'; }
  else if (msg.startsWith('Calling')) { icon = '⟳ '; color = 'var(--yellow)'; }
  else if (msg.startsWith('LLM responded')) { icon = '◆ '; color = 'var(--accent2)'; }
  else if (msg.match(/^\d+\./)) { icon = ''; color = '#e4e4e7'; }
  else if (msg.startsWith('  ')) { color = 'var(--dim)'; }
  return '<div style="display:flex;gap:8px;padding:3px 0 3px 8px;font-size:13px;line-height:1.6"><span style="color:var(--dim);font-size:11px;min-width:52px;font-family:monospace">' + time + '</span><span style="color:' + color + '">' + icon + esc(msg) + '</span></div>';
}

function toggleStep(step) {
  expandedSteps[step] = !expandedSteps[step];
  const el = document.getElementById('step-logs-' + step);
  const arrow = document.getElementById('step-arrow-' + step);
  if (el) el.style.display = expandedSteps[step] ? 'block' : 'none';
  if (arrow) arrow.textContent = expandedSteps[step] ? '▾' : '▸';
}

async function pollPipeline() {
  if (!activePipelineRun) return;
  try {
    const r = await api('/pipeline/' + activePipelineRun + '/status');
    const statuses = r.step_status || {};
    const errors = r.step_errors || {};
    const logs = r.step_logs || {};
    const allDone = !Object.values(statuses).some(s => s === 'pending' || s === 'running');

    const container = document.getElementById('pipeline-status');
    if (!container) return;

    // First render: build the skeleton
    if (!pipelineInitialized || !container.querySelector('.pipeline-card')) {
      // Auto-expand running steps
      for (const [step, status] of Object.entries(statuses)) {
        if (status === 'running') expandedSteps[step] = true;
      }
      let html = '<div class="card pipeline-card"><h3 style="margin-bottom:12px">Pipeline: ' + activePipelineRun.substring(0, 8) + '...</h3>';
      // Step badges row
      html += '<div class="pipeline-steps" id="pipeline-badges">';
      for (const [step, status] of Object.entries(statuses)) {
        html += '<div class="step-badge ' + status + '" id="badge-' + step + '" style="cursor:pointer" onclick="toggleStep(\'' + step + '\')">' + step.replace(/_/g, ' ') + '</div>';
      }
      html += '</div>';
      // Agent detail sections
      if (verboseMode) {
        html += '<div id="agent-sections" style="margin-top:16px">';
        for (const [step, status] of Object.entries(statuses)) {
          const isExpanded = expandedSteps[step];
          const statusColor = status === 'completed' ? 'var(--green)' : status === 'running' ? 'var(--blue)' : status === 'failed' ? 'var(--red)' : 'var(--dim)';
          html += '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden" id="step-section-' + step + '">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;background:var(--card);user-select:none" onclick="toggleStep(\'' + step + '\')">';
          html += '<div style="display:flex;align-items:center;gap:8px"><span id="step-arrow-' + step + '" style="color:var(--dim);font-size:12px">' + (isExpanded ? '▾' : '▸') + '</span>';
          html += '<span style="font-weight:600;font-size:13px">' + step.replace(/_/g, ' ') + '</span>';
          html += '<span style="font-size:11px;color:' + statusColor + ';font-weight:500" id="step-status-' + step + '">' + status + '</span></div>';
          html += '<span style="font-size:11px;color:var(--dim)" id="step-summary-' + step + '"></span>';
          html += '</div>';
          html += '<div id="step-logs-' + step + '" style="display:' + (isExpanded ? 'block' : 'none') + ';max-height:350px;overflow-y:auto;padding:4px 6px;background:#0d0f14;border-top:1px solid var(--border)"></div>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '<div id="pipeline-errors"></div>';
      html += '<div id="pipeline-footer"></div>';
      html += '</div>';
      container.innerHTML = html;
      pipelineInitialized = true;
      prevLogCounts = {};
    }

    // Update badges in-place
    for (const [step, status] of Object.entries(statuses)) {
      const badge = document.getElementById('badge-' + step);
      if (badge) { badge.className = 'step-badge ' + status; badge.style.cursor = 'pointer'; }
      // Auto-expand when a step starts running
      if (status === 'running' && !expandedSteps[step]) {
        expandedSteps[step] = true;
        const el = document.getElementById('step-logs-' + step);
        const arrow = document.getElementById('step-arrow-' + step);
        if (el) el.style.display = 'block';
        if (arrow) arrow.textContent = '▾';
      }
    }

    // Update agent sections in-place (append new logs only)
    if (verboseMode) {
      for (const [step, status] of Object.entries(statuses)) {
        const stepLogs = logs[step] || [];
        const statusEl = document.getElementById('step-status-' + step);
        const summaryEl = document.getElementById('step-summary-' + step);
        const logsEl = document.getElementById('step-logs-' + step);
        const sectionEl = document.getElementById('step-section-' + step);

        // Update status text and color
        if (statusEl) {
          const statusColor = status === 'completed' ? 'var(--green)' : status === 'running' ? 'var(--blue)' : status === 'failed' ? 'var(--red)' : 'var(--dim)';
          statusEl.textContent = status;
          statusEl.style.color = statusColor;
        }

        // Update section border for running step
        if (sectionEl) {
          sectionEl.style.borderColor = status === 'running' ? 'var(--blue)' : 'var(--border)';
        }

        // Show latest activity as summary
        if (summaryEl && stepLogs.length) {
          const last = stepLogs[stepLogs.length - 1].replace(/^\[\d{2}:\d{2}:\d{2}\]\s*/, '');
          summaryEl.textContent = last.substring(0, 80) + (last.length > 80 ? '...' : '');
        }

        // Append only NEW log lines
        if (logsEl) {
          const prevCount = prevLogCounts[step] || 0;
          if (stepLogs.length > prevCount) {
            const newLogs = stepLogs.slice(prevCount);
            let newHtml = '';
            for (const log of newLogs) newHtml += formatLogLine(log);
            logsEl.insertAdjacentHTML('beforeend', newHtml);
            // Auto-scroll only if user hasn't scrolled up
            const isNearBottom = logsEl.scrollHeight - logsEl.scrollTop - logsEl.clientHeight < 80;
            if (isNearBottom) logsEl.scrollTop = logsEl.scrollHeight;
          }
          prevLogCounts[step] = stepLogs.length;
        }
      }
    }

    // Update errors in-place
    const errEl = document.getElementById('pipeline-errors');
    if (errEl) {
      const errEntries = Object.entries(errors).filter(([k,v]) => v);
      if (errEntries.length) {
        let eh = '<div class="log" style="border-color:var(--red);margin-top:8px">';
        for (const [step, err] of errEntries) eh += '<div style="color:var(--red);font-size:13px"><strong>' + step.replace(/_/g, ' ') + ':</strong> ' + esc(err).substring(0, 300) + '</div>';
        eh += '</div>';
        errEl.innerHTML = eh;
      }
    }

    // Update footer
    const footerEl = document.getElementById('pipeline-footer');
    if (footerEl && allDone) {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      localStorage.removeItem('tce_active_run');
      const hasCompleted = Object.values(statuses).some(s => s === 'completed');
      const hasFailed = Object.values(statuses).some(s => s === 'failed');
      let fh = '<div style="margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
      fh += '<span style="color:' + (hasFailed ? 'var(--yellow)' : 'var(--green)') + ';font-weight:600">' + (hasFailed ? 'Pipeline finished with errors' : 'Pipeline complete') + '</span>';
      fh += '<span id="run-cost-badge" style="font-size:13px;color:var(--accent2)"></span>';
      fh += '</div>';
      // Fetch run cost
      if (activePipelineRun) {
        api('/costs/run/' + activePipelineRun).then(c => {
          const badge = document.getElementById('run-cost-badge');
          if (badge && c.total_cost) badge.textContent = 'Cost: $' + c.total_cost.toFixed(2);
        }).catch(() => {});
      }
      fh += '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">';
      // Check if a guide was produced (docx_guide_builder completed)
      if (statuses.docx_guide_builder === 'completed') {
        fh += '<button class="btn btn-green" style="font-size:14px;padding:10px 20px" onclick="downloadLatestGuide()">Download Guide</button>';
      }
      if (hasCompleted) {
        fh += '<button class="btn btn-dim" style="font-size:13px;padding:8px 16px" onclick="currentTab=\'packages\';switchTab(\'packages\');render()">View Packages</button>';
      }
      fh += '</div>';
      footerEl.innerHTML = fh;
    }

    const btn = document.getElementById('run-btn');
    if (btn) { btn.disabled = !allDone; btn.textContent = allDone ? 'Run Pipeline' : 'Running...'; }
  } catch (e) {
    if (e.message?.includes('404') || e.message?.includes('not found')) {
      localStorage.removeItem('tce_active_run');
      activePipelineRun = null;
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }
  }
}

// Download the most recent guide DOCX
async function downloadLatestGuide() {
  try {
    const guides = await api('/content/guides');
    if (!guides.length) { alert('No guides found. The guide builder may not have saved to the database.'); return; }
    const latest = guides[0];
    if (!latest.docx_path) { alert('Guide was created but no DOCX file was generated.'); return; }
    window.open(API + '/content/guides/' + latest.id + '/download', '_blank');
  } catch (e) {
    alert('Failed to fetch guide: ' + e.message);
  }
}

// PACKAGES TAB
let pkgDayFilter = Math.min(Math.max(new Date().getDay() - 1, 0), 4);
let pkgStatusFilter = '';
let pkgQaFilter = '';
let pkgSourceFilter = '';
let _pkgCache = null;
let _pkgDayMapCache = null;

// Pagination + virtualization state for the Packages tab.
// Each card is rendered as a collapsed header by default; clicking expands it.
// IntersectionObserver auto-collapses cards that scroll fully out of view so
// even with many expansions the live DOM stays bounded.
const PKG_PAGE_SIZE = 20;
let pkgPage = 1;                      // 1-indexed
const expandedPkgs = new Set();       // pkg IDs currently expanded
let _pkgVisibilityObserver = null;    // IntersectionObserver instance
let _pkgFilteredCache = [];           // last filtered list (for pagination math)

function switchPkgDay(day) {
  pkgDayFilter = day;
  pkgPage = 1;
  _renderPkgFromCache();
}

function _renderPkgFromCache() {
  if (!_pkgCache) return;
  const pkgs = _pkgCache;
  const pkgDayMap = _pkgDayMapCache || {};

  // Build day tabs
  const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
  const monday = getMondayOfWeek();
  let tabHtml = '<div style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap">';
  for (let d = 0; d < 5; d++) {
    const dayDate = new Date(monday); dayDate.setDate(dayDate.getDate() + d);
    const dateLabel = dayDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const hasPkg = Object.values(pkgDayMap).some(m => m.day === d);
    const isActive = pkgDayFilter === d;
    const dotColor = hasPkg ? 'var(--green)' : 'var(--border)';
    tabHtml += '<button onclick="switchPkgDay(' + d + ')" style="padding:8px 14px;border:1px solid ' + (isActive ? 'var(--accent)' : 'var(--border)') + ';background:' + (isActive ? 'var(--accent)' : 'var(--card)') + ';color:' + (isActive ? '#fff' : 'var(--text)') + ';border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';display:inline-block"></span>' + dayNames[d] + ' ' + dateLabel + '</button>';
  }
  const unlinkedCount = pkgs.filter(p => !pkgDayMap[p.id]).length;
  if (unlinkedCount > 0) {
    const isOther = pkgDayFilter === 'other';
    tabHtml += '<button onclick="switchPkgDay(&quot;other&quot;)" style="padding:8px 14px;border:1px solid ' + (isOther ? 'var(--accent)' : 'var(--border)') + ';background:' + (isOther ? 'var(--accent)' : 'var(--card)') + ';color:' + (isOther ? '#fff' : 'var(--dim)') + ';border-radius:6px;cursor:pointer;font-size:13px">Other (' + unlinkedCount + ')</button>';
  }
  const isAll = pkgDayFilter === null;
  tabHtml += '<button onclick="switchPkgDay(null)" style="padding:8px 14px;border:1px solid ' + (isAll ? 'var(--accent)' : 'var(--border)') + ';background:' + (isAll ? 'var(--accent)' : 'var(--card)') + ';color:' + (isAll ? '#fff' : 'var(--dim)') + ';border-radius:6px;cursor:pointer;font-size:13px">All (' + pkgs.length + ')</button>';
  tabHtml += '</div>';
  // GAP-29: Status, QA, and Source filters
  tabHtml += '<div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">';
  const _selStyle = 'padding:4px 8px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px';
  const _opt = (v, l, cur) => '<option value="' + v + '"' + (cur === v ? ' selected' : '') + '>' + l + '</option>';
  tabHtml += '<select id="pkg-status-filter" onchange="filterPkgStatus()" style="' + _selStyle + '">' + _opt('', 'All statuses', pkgStatusFilter) + _opt('draft', 'Draft', pkgStatusFilter) + _opt('approved', 'Approved', pkgStatusFilter) + _opt('rejected', 'Rejected', pkgStatusFilter) + '</select>';
  tabHtml += '<select id="pkg-qa-filter" onchange="filterPkgStatus()" style="' + _selStyle + '">' + _opt('', 'Any QA', pkgQaFilter) + _opt('pass', 'QA Pass (7+)', pkgQaFilter) + _opt('conditional', 'Conditional (5-7)', pkgQaFilter) + _opt('fail', 'QA Fail (&lt;5)', pkgQaFilter) + '</select>';
  tabHtml += '<select id="pkg-source-filter" onchange="filterPkgStatus()" style="' + _selStyle + '">'
    + _opt('', 'Any origin', pkgSourceFilter)
    + '<optgroup label="Start from Something">'
    + _opt('__something__', 'Any Something', pkgSourceFilter)
    + _opt('topic', 'Topic', pkgSourceFilter)
    + _opt('repo', 'Repo', pkgSourceFilter)
    + _opt('copy', 'Copy', pkgSourceFilter)
    + '</optgroup>'
    + '<optgroup label="Other origins">'
    + _opt('weekly_plan', 'Weekly Plan (Generate from Plan)', pkgSourceFilter)
    + _opt('pipeline', 'Pipeline (legacy)', pkgSourceFilter)
    + _opt('manual', 'Manual', pkgSourceFilter)
    + '</optgroup>'
    + '</select>';
  tabHtml += '</div>';
  document.getElementById('pkg-day-tabs').innerHTML = tabHtml;

  // Filter
  let filteredPkgs = pkgs;
  if (pkgDayFilter !== null && pkgDayFilter !== 'other') {
    const dayPkgIds = new Set(Object.entries(pkgDayMap).filter(([, m]) => m.day === pkgDayFilter).map(([id]) => id));
    filteredPkgs = pkgs.filter(p => dayPkgIds.has(p.id));
  } else if (pkgDayFilter === 'other') {
    filteredPkgs = pkgs.filter(p => !pkgDayMap[p.id]);
  }
  // GAP-29: Apply status, QA, and source filters (state vars survive the innerHTML rewrite above)
  if (pkgStatusFilter) filteredPkgs = filteredPkgs.filter(p => p.approval_status === pkgStatusFilter);
  if (pkgSourceFilter === '__something__') {
    // "Something" = anything from the unified Start-from-Something tab (Topic/Repo/Copy)
    const somethingSources = new Set(['topic', 'repo', 'copy']);
    filteredPkgs = filteredPkgs.filter(p => somethingSources.has(p.source));
  } else if (pkgSourceFilter) {
    filteredPkgs = filteredPkgs.filter(p => p.source === pkgSourceFilter);
  }
  if (pkgQaFilter) {
    filteredPkgs = filteredPkgs.filter(p => {
      const qs = p.quality_scores?.composite_score || p.quality_scores?.overall;
      const score = typeof qs === 'number' ? qs : (qs?.score || 0);
      if (pkgQaFilter === 'pass') return score >= 7;
      if (pkgQaFilter === 'conditional') return score >= 5 && score < 7;
      if (pkgQaFilter === 'fail') return score < 5;
      return true;
    });
  }

  if (!filteredPkgs.length) { document.getElementById('pkg-list').innerHTML = '<div class="empty" style="padding:24px;text-align:center">No packages for this day.</div>'; return; }

  // Cache the filtered list so togglePkgExpand and viewPackage can resolve a
  // pkg by id without re-running every filter.
  _pkgFilteredCache = filteredPkgs;

  // Clamp page in case filters shrunk the list below the current page.
  const totalPages = Math.max(1, Math.ceil(filteredPkgs.length / PKG_PAGE_SIZE));
  if (pkgPage > totalPages) pkgPage = totalPages;
  if (pkgPage < 1) pkgPage = 1;
  const pageStart = (pkgPage - 1) * PKG_PAGE_SIZE;
  const pageSlice = filteredPkgs.slice(pageStart, pageStart + PKG_PAGE_SIZE);

  let html = '<div class="packages-list">';
  for (const p of pageSlice) {
    const dayInfo = pkgDayMap[p.id];
    if (dayInfo) {
      const dayLabel = DAY_NAMES[dayInfo.day] || '';
      const angleLabel = ANGLE_LABELS[dayInfo.angle] || (dayInfo.angle || '').replace(/_/g, ' ');
      html += '<div style="font-size:12px;color:var(--dim);margin-bottom:4px;display:flex;align-items:center;gap:8px"><span style="color:var(--accent2);font-weight:600">' + dayLabel + ' ' + dayInfo.date + '</span><span>' + angleLabel + '</span></div>';
    }
    // Default: collapsed stub. If the user previously expanded this card and
    // it scrolled into view again, expandedPkgs keeps the preference so
    // togglePkgExpand re-runs after the DOM is in place.
    html += _renderPkgStub(p);
  }
  html += '</div>';

  // Pagination footer
  html += _renderPkgPagination(filteredPkgs.length, totalPages);

  document.getElementById('pkg-list').innerHTML = html;

  // Re-expand any cards the user wants kept open across re-renders.
  for (const id of expandedPkgs) {
    const p = pageSlice.find(x => x.id === id);
    if (p) _expandPkgCard(p);
  }

  // Auto-collapse off-screen expanded cards to keep DOM bounded.
  _initPkgVisibilityObserver();
}

function _renderPkgStub(p) {
  // Compact one-line header. Click anywhere on the row toggles the card.
  const statusTag = p.approval_status === 'approved' ? 'tag-approved' : p.approval_status === 'rejected' ? 'tag-rejected' : 'tag-draft';
  const fbWc = (p.facebook_post || '').trim().split(/\s+/).filter(Boolean).length;
  const liWc = (p.linkedin_post || '').trim().split(/\s+/).filter(Boolean).length;
  const compositeRaw = p.quality_scores?.composite_score ?? p.quality_scores?.overall;
  const composite = typeof compositeRaw === 'number' ? compositeRaw : (compositeRaw && compositeRaw.score) || null;
  const qaColor = composite == null ? 'var(--dim)' : composite >= 7 ? 'var(--green)' : composite >= 5 ? 'var(--yellow)' : 'var(--red)';
  const lead = (p.facebook_post || p.linkedin_post || p.title || '').replace(/\s+/g, ' ').trim().slice(0, 110);
  const sourceBadge = p.source ? '<span style="font-size:10px;color:var(--dim);background:var(--card);border:1px solid var(--border);padding:1px 6px;border-radius:8px;margin-left:6px">' + esc(p.source) + '</span>' : '';
  let html = '<div class="pkg-card pkg-stub" id="pkg-' + p.id + '"' + (p.is_archived ? ' style="opacity:0.5"' : '') + '>';
  html += '<div class="pkg-stub-header" style="display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none" onclick="togglePkgExpand(\'' + p.id + '\')">';
  html += '<span class="pkg-chevron" style="display:inline-block;width:14px;color:var(--dim);transition:transform 0.15s">&#9656;</span>';
  html += '<span class="tag ' + statusTag + '">' + p.approval_status + '</span>' + sourceBadge;
  html += '<span style="flex:1;min-width:0;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(lead || '(no content)') + '</span>';
  if (fbWc) html += '<span style="font-size:11px;color:var(--accent2);font-weight:600;white-space:nowrap">FB ' + fbWc + 'w</span>';
  if (liWc) html += '<span style="font-size:11px;color:var(--accent2);font-weight:600;white-space:nowrap">LI ' + liWc + 'w</span>';
  if (composite != null) html += '<span style="font-size:11px;color:' + qaColor + ';font-weight:700;white-space:nowrap">QA ' + composite.toFixed(1) + '</span>';
  html += '<span style="font-size:11px;color:var(--dim);white-space:nowrap">' + new Date(p.created_at).toLocaleDateString('en-GB', {day:'numeric', month:'short'}) + '</span>';
  html += '</div>';
  html += '</div>';
  return html;
}

function _renderPkgPagination(total, totalPages) {
  if (totalPages <= 1) {
    return '<div style="font-size:11px;color:var(--dim);text-align:center;padding:12px">' + total + ' package' + (total === 1 ? '' : 's') + '</div>';
  }
  const start = (pkgPage - 1) * PKG_PAGE_SIZE + 1;
  const end = Math.min(pkgPage * PKG_PAGE_SIZE, total);
  const btn = (label, target, disabled) =>
    '<button class="btn btn-dim" style="font-size:12px;padding:4px 10px' + (disabled ? ';opacity:0.4;cursor:not-allowed' : '') + '"' +
    (disabled ? ' disabled' : ' onclick="gotoPkgPage(' + target + ')"') + '>' + label + '</button>';
  let html = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-top:1px solid var(--border);margin-top:12px;flex-wrap:wrap">';
  html += btn('&laquo; Prev', pkgPage - 1, pkgPage <= 1);
  html += '<span style="font-size:12px;color:var(--dim);padding:0 8px">Showing ' + start + '-' + end + ' of ' + total + ' &middot; Page ' + pkgPage + ' / ' + totalPages + '</span>';
  html += btn('Next &raquo;', pkgPage + 1, pkgPage >= totalPages);
  html += '</div>';
  return html;
}

function gotoPkgPage(page) {
  pkgPage = page;
  // Don't preserve expansions across page changes - feels surprising.
  expandedPkgs.clear();
  _renderPkgFromCache();
  // Scroll to top of list so user can see the new page.
  const list = document.getElementById('pkg-list');
  if (list) list.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function togglePkgExpand(pkgId) {
  const card = document.getElementById('pkg-' + pkgId);
  if (!card) return;
  if (card.classList.contains('pkg-stub')) {
    const p = (_pkgFilteredCache || []).find(x => x.id === pkgId) ||
              (_pkgCache || []).find(x => x.id === pkgId);
    if (!p) return;
    expandedPkgs.add(pkgId);
    _expandPkgCard(p);
  } else {
    expandedPkgs.delete(pkgId);
    _collapsePkgCard(pkgId);
  }
}

function _expandPkgCard(p) {
  const card = document.getElementById('pkg-' + p.id);
  if (!card || !card.classList.contains('pkg-stub')) return;
  // Replace the stub with the full card. _renderPkgCard returns the whole
  // outer pkg-card div, so swap outerHTML.
  const wrapper = document.createElement('div');
  wrapper.innerHTML = _renderPkgCard(p);
  const fullCard = wrapper.firstElementChild;
  if (!fullCard) return;
  // Stamp a "Collapse" toggle at the very top so the user can fold it again.
  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'btn btn-dim';
  collapseBtn.style.cssText = 'position:absolute;top:10px;right:12px;font-size:11px;padding:3px 10px;z-index:1';
  collapseBtn.textContent = '× Collapse';
  collapseBtn.onclick = (ev) => { ev.stopPropagation(); togglePkgExpand(p.id); };
  fullCard.style.position = 'relative';
  fullCard.appendChild(collapseBtn);
  card.replaceWith(fullCard);
  // Re-observe the new full card for off-screen auto-collapse.
  if (_pkgVisibilityObserver) _pkgVisibilityObserver.observe(fullCard);
}

function _collapsePkgCard(pkgId) {
  const card = document.getElementById('pkg-' + pkgId);
  if (!card || card.classList.contains('pkg-stub')) return;
  const p = (_pkgFilteredCache || []).find(x => x.id === pkgId) ||
            (_pkgCache || []).find(x => x.id === pkgId);
  if (!p) return;
  const wrapper = document.createElement('div');
  wrapper.innerHTML = _renderPkgStub(p);
  const stub = wrapper.firstElementChild;
  if (!stub) return;
  card.replaceWith(stub);
  if (_pkgVisibilityObserver) _pkgVisibilityObserver.observe(stub);
}

function _initPkgVisibilityObserver() {
  // IntersectionObserver auto-collapses cards that scroll fully out of view.
  // Even with many expansions the live DOM stays bounded.
  if (_pkgVisibilityObserver) {
    _pkgVisibilityObserver.disconnect();
  }
  _pkgVisibilityObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) continue;
      const card = entry.target;
      if (!card.classList.contains('pkg-card') || card.classList.contains('pkg-stub')) continue;
      const id = (card.id || '').replace(/^pkg-/, '');
      if (!id) continue;
      // Only auto-collapse if user didn't explicitly mark this expanded.
      // (User-clicked stays expanded across scroll; auto-collapse only kicks
      // in for cards we'd otherwise leave expanded across navigation.)
      // Actually the simpler rule that matches user expectation: auto-collapse
      // any expanded card off-screen. The user can click again to re-expand.
      // Skip if it was just opened via a deep link (data-keep-open="1").
      if (card.dataset.keepOpen === '1') continue;
      expandedPkgs.delete(id);
      _collapsePkgCard(id);
    }
  }, { rootMargin: '500px 0px' });  // 500px buffer so collapse happens after card is well out of view

  for (const card of document.querySelectorAll('.pkg-card')) {
    _pkgVisibilityObserver.observe(card);
  }
}

async function renderPackages() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2>Content Packages</h2><div style="display:flex;align-items:center;gap:12px"><button class="btn btn-dim" style="font-size:11px;padding:4px 10px" onclick="backfillHooks(this)">Backfill All Hooks</button><label style="font-size:12px;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:6px"><input type="checkbox" id="show-archived" ' + (showArchived ? 'checked' : '') + ' onchange="showArchived=this.checked;_pkgCache=null;renderPackages()"> Show archived</label></div></div><div id="pkg-day-tabs"></div><div id="pkg-list"><div class="empty">Loading packages...</div></div></div>';
  try {
    const [pkgs, calEntries] = await Promise.all([
      api('/content/packages' + (showArchived ? '?include_archived=true' : '')),
      api('/calendar/?start=' + fmtDate(getMondayOfWeek()) + '&end=' + fmtDate((() => { const f = getMondayOfWeek(); f.setDate(f.getDate() + 4); return f; })())).catch(() => [])
    ]);
    if (!pkgs.length) { document.getElementById('pkg-list').innerHTML = '<div class="empty">No packages yet. Run a pipeline first.</div>'; return; }
    const pkgDayMap = {};
    for (const e of calEntries) {
      if (e.post_package_id) pkgDayMap[e.post_package_id] = { day: e.day_of_week, date: e.date, topic: e.topic, angle: e.angle_type };
    }
    _pkgCache = pkgs;
    _pkgDayMapCache = pkgDayMap;
    _renderPkgFromCache();
  } catch (e) { document.getElementById('pkg-list').innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; }
  // Load weekly guides into packages tab
  try {
    const guides = await api('/content/guides');
    if (guides.length) {
      let ghtml = '<div style="margin-top:24px"><h2 style="margin-bottom:12px">Weekly Guides</h2>';
      for (const g of guides) {
        ghtml += '<div class="guide-card">';
        ghtml += '<h3>' + esc(g.guide_title) + '</h3>';
        ghtml += '<div class="guide-meta"><span>Week of ' + g.week_start_date + '</span><span>Theme: ' + esc(g.weekly_theme) + '</span>';
        if (g.cta_keyword) ghtml += '<span>CTA: <strong>' + esc(g.cta_keyword) + '</strong></span>';
        ghtml += '</div>';
        ghtml += '<div class="btn-group" style="margin:12px 0">';
        if (g.docx_path) ghtml += '<button class="btn btn-green" onclick="downloadGuide(\'' + g.id + '\',\'' + esc(g.guide_title).replace(/'/g, '') + '\')">Download DOCX</button>';
        if (g.fulfillment_link) ghtml += '<a class="btn btn-blue" href="' + esc(g.fulfillment_link) + '" target="_blank">Fulfillment Link</a>';
        ghtml += '<button class="btn btn-dim" onclick="archiveGuide(\'' + g.id + '\')">Archive</button>';
        ghtml += '</div>';
        if (g.markdown_content) {
          ghtml += '<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--accent2);font-size:13px">View Guide Content</summary>';
          ghtml += '<div class="post-preview" style="margin-top:8px;max-height:400px;overflow-y:auto;white-space:pre-wrap">' + esc(g.markdown_content) + '</div></details>';
        }
        ghtml += '<div style="font-size:11px;color:var(--dim);margin-top:8px">Created: ' + new Date(g.created_at).toLocaleString() + '</div>';
        ghtml += '</div>';
      }
      ghtml += '</div>';
      document.getElementById('pkg-list').insertAdjacentHTML('afterend', ghtml);
    }
  } catch {}
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function linkify(s) { return esc(s).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>'); }

function showPostTab(btn, id) {
  const card = btn.closest('.pkg-card');
  // Hide only tab-pane containers (not their children)
  card.querySelectorAll('.tab-pane').forEach(el => {
    if (el.closest('.pkg-card') === card) el.style.display = 'none';
  });
  card.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const target = document.getElementById(id);
  if (target) target.style.display = '';
}

function copyDmFlow(btn, pid) {
  const container = document.getElementById('dm-' + pid);
  if (!container) return;
  // Collect all message texts
  const parts = [];
  container.querySelectorAll('div > div').forEach(card => {
    const label = card.querySelector('div:first-child');
    const text = card.querySelector('div:last-child');
    if (label && text && label !== text) {
      parts.push(label.textContent.trim() + ':\n' + text.textContent.trim());
    }
  });
  clipCopy(parts.join('\n\n---\n\n'));
  btn.textContent = 'Copied!';
  btn.style.background = 'var(--green)';
  btn.style.color = '#000';
  setTimeout(() => { btn.textContent = 'Copy All DM Messages'; btn.style.background = ''; btn.style.color = ''; }, 2000);
  toast('DM flow copied to clipboard');
}

function copyImagePrompt(btn) {
  const card = btn.closest('div').closest('div[style*="background:#111318"]');
  const preview = card.querySelector('.post-preview');
  if (preview) {
    clipCopy(preview.textContent);
    btn.textContent = 'Copied!';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.style.background = ''; btn.style.color = ''; }, 2000);
    toast('Image prompt copied to clipboard');
  }
}

function copyForPlatform(btn, platformName) {
  const card = btn.closest('div').closest('div[style*="background:#111318"]');
  const preview = card.querySelector('.post-preview');
  if (preview) {
    clipCopy(preview.textContent);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
    setTimeout(() => { btn.textContent = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
    toast('Prompt copied for ' + platformName);
  }
}

async function loadVideos(packageId, pid) {
  const grid = document.getElementById('vid-grid-' + pid);
  const status = document.getElementById('vid-status-' + pid);
  if (!grid) return;
  try {
    const resp = await fetch('/api/v1/videos?package_id=' + packageId);
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error('Server error (' + resp.status + '): ' + errText.substring(0, 100));
    }
    const videos = await resp.json();
    if (!videos.length) {
      status.textContent = 'No videos yet - click Generate to create them';
      grid.innerHTML = '';
      return;
    }
    status.textContent = videos.length + ' video(s) rendered';
    status.style.color = 'var(--green)';
    grid.innerHTML = '';
    videos.forEach(v => {
      const card = document.createElement('div');
      const selected = v.operator_selected ? 'var(--green)' : 'var(--border)';
      card.className = 'vid-card';
      card.style.cssText = 'background:#111318;border:2px solid ' + selected + ';border-radius:8px;padding:16px';
      let inner = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      inner += '<div style="font-weight:600;font-size:14px;color:var(--accent2)">' + esc(v.template_name.replace(/_/g, ' ')) + '</div>';
      inner += '<span style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#16a34a22;color:#16a34a;border:1px solid #16a34a44">' + esc(v.resolution || '') + '</span>';
      inner += '</div>';
      if (v.thumbnail_url) {
        inner += '<div style="margin-bottom:8px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><img src="' + esc(v.thumbnail_url) + '" style="width:100%;display:block" loading="lazy"></div>';
      }
      if (v.video_url) {
        inner += '<div style="margin-bottom:8px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><video src="' + esc(v.video_url) + '" controls style="width:100%;display:block" preload="metadata"></video></div>';
      }
      inner += '<div style="font-size:12px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap">';
      if (v.duration_seconds) inner += '<span>' + v.duration_seconds + 's</span>';
      if (v.codec) inner += '<span>' + esc(v.codec) + '</span>';
      if (v.file_size_bytes) inner += '<span>' + (v.file_size_bytes / 1024).toFixed(0) + ' KB</span>';
      if (v.render_time_seconds) inner += '<span>Rendered in ' + v.render_time_seconds + 's</span>';
      inner += '</div>';
      inner += '<div style="display:flex;gap:6px;margin-top:8px">';
      inner += '<button class="btn btn-dim" style="font-size:11px" onclick="selectVideo(\'' + v.id + '\', ' + !v.operator_selected + ', this)">\u2713 ' + (v.operator_selected ? 'Selected' : 'Select') + '</button>';
      if (v.video_url) inner += '<a href="' + esc(v.video_url) + '" download class="btn btn-dim" style="font-size:11px;text-decoration:none">Download</a>';
      inner += '</div>';
      card.innerHTML = inner;
      grid.appendChild(card);
    });
  } catch (e) {
    status.textContent = 'Error loading videos: ' + e.message;
    status.style.color = 'var(--red)';
  }
}

async function selectVideo(videoId, selected, btn) {
