async function generateFromPlan() {
  // Check if there is an approved plan in calendar entries
  try {
    const monday = getMondayOfWeek();
    const friday = new Date(monday); friday.setDate(friday.getDate() + 4);
    const entries = await api('/calendar/?start=' + fmtDate(monday) + '&end=' + fmtDate(friday));
    const withPlan = entries.filter(e => e.plan_context && ['approved', 'planned'].includes(e.status));
    if (withPlan.length === 0) {
      toast('No plan found for this week. Click "Plan This Week" first.', false);
      return;
    }
    // Videos mode: loop walking-video pipeline over un-generated video days.
    // Posts mode: reconstruct plan and call posts pipeline.
    if (_weekMode === 'videos') {
      const todo = withPlan.filter(e =>
        !e.walking_video_script_id &&
        e.plan_context?.content_format === 'walking_video'
      );
      if (todo.length === 0) { toast('All video scripts already generated.'); return; }
      await generateAllWalkingVideos(todo);
      return;
    }
    // Reconstruct approved plan from calendar entries (posts mode)
    const plan = {
      weekly_theme: '',
      gift_theme: '',
      cta_keyword: '',
      days: withPlan.map(e => ({
        day_of_week: e.day_of_week,
        ...e.plan_context,
      })),
    };
    // Parse operator_notes for theme/cta
    const notes = withPlan[0].operator_notes || '';
    const themeMatch = notes.match(/Weekly theme: ([^|]+)/);
    const ctaMatch = notes.match(/CTA: ([^|]+)/);
    const giftMatch = notes.match(/Gift: (.+)$/);
    if (themeMatch) plan.weekly_theme = themeMatch[1].trim();
    if (ctaMatch) plan.cta_keyword = ctaMatch[1].trim();
    if (giftMatch) plan.gift_theme = giftMatch[1].trim();
    generateFromApprovedPlan(plan);
  } catch (e) { toast('Error: ' + e.message, false); }
}

// Run walking-video generation over a batch of calendar entries sequentially.
// Sequential (not parallel) so the operator can see per-day progress and so
// the LLM/Whisper backend isn't slammed with 5 concurrent runs.
async function generateAllWalkingVideos(entries) {
  const btn = document.getElementById('gen-all-btn');
  const total = entries.length;
  let done = 0, failed = 0;
  if (btn) { btn.disabled = true; btn.textContent = 'Generating 0/' + total + '...'; }
  for (const e of entries) {
    if (btn) btn.textContent = 'Generating ' + (done + failed + 1) + '/' + total + '...';
    const dayCard = document.querySelector('[data-day-idx="' + e.day_of_week + '"]');
    const dayBtn = dayCard?.querySelector('button.btn-primary');
    const scriptId = await generateWalkingVideoInline(e.id, dayBtn);
    if (scriptId) done++; else failed++;
  }
  if (btn) {
    btn.disabled = false;
    btn.textContent = failed ? ('Done: ' + done + ' ok, ' + failed + ' failed') : 'Regenerate All Videos';
    btn.className = failed ? 'btn btn-yellow' : 'btn btn-dim';
  }
  if (failed) toast(failed + ' video(s) failed - check the day cards', false);
  else toast('All ' + done + ' videos generated.');
  await renderWeek();
}

function getMondayOfWeek() {
  const now = new Date();
  now.setDate(now.getDate() + (weekOffset || 0) * 7);
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(now.setDate(diff));
}

async function runDayPipeline(dayOfWeek, entryId) {
  // Find the button and day card for inline progress
  const dayCard = document.querySelector('[data-day-idx="' + dayOfWeek + '"]');
  const regenBtn = dayCard?.querySelector('button.btn-dim');
  if (regenBtn) { regenBtn.disabled = true; regenBtn.textContent = 'Starting...'; }

  try {
    // Check if this day has a planned topic via plan_context
    const entry = _weekEntries[dayOfWeek];
    const pc = entry?.plan_context;
    let workflow = 'daily_content';
    const context = { day_of_week: dayOfWeek };

    if (pc && (pc.topic || pc.thesis)) {
      // Use daily_from_plan so we skip trend_scout and respect the planned topic
      workflow = 'daily_from_plan';
      const briefKeys = ['topic','thesis','audience','angle_type','day_label','visual_job','platform_notes','desired_belief_shift','evidence_requirements','template_id'];
      const storyBrief = {};
      const src = pc.story_brief || pc;
      briefKeys.forEach(k => { if (src[k]) storyBrief[k] = src[k]; });
      context.story_brief = storyBrief;
      if (pc._weekly) {
        if (pc._weekly.weekly_theme) context.weekly_theme = pc._weekly.weekly_theme;
        if (pc._weekly.cta_keyword) context.weekly_keyword = pc._weekly.cta_keyword;
        if (pc._weekly.gift_theme) { context.gift_theme = pc._weekly.gift_theme; context.guide_title = pc._weekly.gift_theme; }
      }
      if (pc.connection_to_gift) context.connection_to_gift = pc.connection_to_gift;
    }

    const r = await api('/pipeline/run', {
      method: 'POST',
      body: JSON.stringify({ workflow, context }),
    });
    // Persist regen state so it survives page refresh
    const regenState = { runId: r.run_id, dayOfWeek, startTime: Date.now() };
    localStorage.setItem('tce_day_regen', JSON.stringify(regenState));
    activePipelineRun = r.run_id;
    localStorage.setItem('tce_active_run', r.run_id);
    toast('Regenerating ' + DAY_NAMES[dayOfWeek] + ' package (using planned topic)...');

    _startDayRegenPoll(regenState);
  } catch (e) {
    if (regenBtn) { regenBtn.disabled = false; regenBtn.textContent = 'Regenerate'; }
    toast('Failed: ' + e.message, false);
  }
}

function _startDayRegenPoll(regenState) {
  const { runId, dayOfWeek, startTime } = regenState;
  const dayCard = document.querySelector('[data-day-idx="' + dayOfWeek + '"]');
  const regenBtn = dayCard?.querySelector('button.btn-dim');
  if (regenBtn) { regenBtn.disabled = true; regenBtn.textContent = 'Regenerating...'; }

  // Show inline progress on the day card
  let progressEl = document.getElementById('day-regen-progress-' + dayOfWeek);
  if (!progressEl && dayCard) {
    progressEl = document.createElement('div');
    progressEl.id = 'day-regen-progress-' + dayOfWeek;
    progressEl.style.cssText = 'margin-top:8px;padding:6px 8px;background:#0d1117;border:1px solid var(--blue);border-radius:6px;font-size:11px;color:var(--blue);line-height:1.4';
    dayCard.appendChild(progressEl);
  }
  const spinnerHtml = '<span style="display:inline-block;width:10px;height:10px;border:2px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle"></span>';
  if (progressEl) progressEl.innerHTML = spinnerHtml + 'Starting pipeline...';

  const inlinePoll = setInterval(async () => {
    try {
      const s = await api('/pipeline/' + runId + '/status');
      const statuses = s.step_status || {};
      const logs = s.step_logs || {};
      const allDone = !Object.values(statuses).some(v => v === 'pending' || v === 'running');
      const running = Object.entries(statuses).find(([k,v]) => v === 'running');
      const completed = Object.entries(statuses).filter(([k,v]) => v === 'completed').length;
      const total = Object.keys(statuses).length;
      const elapsed = Math.round((Date.now() - startTime) / 1000);
      const elapsedStr = elapsed < 60 ? elapsed + 's' : Math.floor(elapsed/60) + 'm ' + (elapsed%60) + 's';

      if (progressEl) {
        let detail = '';
        if (running) {
          const agentName = running[0].replace(/_/g, ' ');
          // Get latest log line for this agent
          const agentLogs = logs[running[0]] || [];
          const lastLog = agentLogs.length ? agentLogs[agentLogs.length - 1].replace(/^\[\d{2}:\d{2}:\d{2}\]\s*/, '').substring(0, 60) : '';
          detail = spinnerHtml + '<strong>' + agentName + '</strong> (' + completed + '/' + total + ' - ' + elapsedStr + ')';
          if (lastLog) detail += '<div style="color:var(--dim);font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(lastLog) + '</div>';
        } else if (!allDone) {
          detail = spinnerHtml + 'Waiting... (' + completed + '/' + total + ' - ' + elapsedStr + ')';
        }
        progressEl.innerHTML = detail;
      }

      if (allDone) {
        clearInterval(inlinePoll);
        localStorage.removeItem('tce_day_regen');
        localStorage.removeItem('tce_active_run');
        activePipelineRun = null;
        if (progressEl) progressEl.remove();
        const hasFailed = Object.values(statuses).some(v => v === 'failed');
        if (hasFailed) {
          const errors = s.step_errors || {};
          const errMsg = Object.entries(errors).filter(([k,v]) => v).map(([k,v]) => k + ': ' + v).join('; ').substring(0, 100);
          toast(DAY_NAMES[dayOfWeek] + ' regeneration failed: ' + (errMsg || 'unknown error'), false);
        } else {
          toast(DAY_NAMES[dayOfWeek] + ' package regenerated!');
        }
        await renderWeek();
      }
    } catch (e) {
      // Polling error - keep trying
    }
  }, 2000);
}

function formatElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
}
function getIsraelTime() {
  try { return new Date().toLocaleTimeString('en-GB', { timeZone: 'Asia/Jerusalem', hour: '2-digit', minute: '2-digit' }) + ' IST'; }
  catch { const d = new Date(Date.now() + 3 * 3600000); return d.getUTCHours().toString().padStart(2,'0') + ':' + d.getUTCMinutes().toString().padStart(2,'0') + ' IST'; }
}
function _renderLogFeed(logs) {
  // logs = { agent_name: ["[HH:MM:SS] msg", ...], ... } - show last entries from running agents
  if (!logs || !Object.keys(logs).length) return '';
  const lines = [];
  for (const [agent, entries] of Object.entries(logs)) {
    if (!entries?.length) continue;
    const last = entries[entries.length - 1];
    if (last) lines.push({ agent, msg: last });
  }
  if (!lines.length) return '';
  let h = '<div style="background:#0a0e14;border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-top:8px;font-family:monospace;font-size:11px;line-height:1.6;max-height:80px;overflow-y:auto">';
  for (const l of lines.slice(-3)) {
    h += '<div style="color:var(--dim)"><span style="color:var(--accent2)">' + esc(l.agent.replace(/_/g, ' ')) + '</span> ' + esc(l.msg) + '</div>';
  }
  h += '</div>';
  return h;
}
function renderGenAllProgress() {
  const el = document.getElementById('gen-all-progress');
  if (!el) return;
  if (!genAllState) { el.innerHTML = ''; return; }
  const s = genAllState;
  const elapsed = s.startTime ? formatElapsed(Date.now() - s.startTime) : '';
  const israelTime = getIsraelTime();
  let html = '<div class="card" style="margin-bottom:16px;padding:16px">';

  // Phase-aware header
  let headerText = s.phase === 'interrupted' ? 'Generation interrupted' : (s.phase === 'failed' ? 'Generation failed' : 'Generation complete');
  if (s.running) {
    if (s.unified) {
      if (s.phase === 'planning') headerText = 'Planning the week (trend scout + strategy)...';
      else if (s.phase === 'generating_days') headerText = 'Generating day ' + ((s.current >= 0 ? s.current : 0) + 1) + '/5 - ' + DAY_NAMES[s.current >= 0 ? s.current : 0];
      else if (s.phase === 'building_guide') headerText = 'Building weekly guide...';
      else if (s.phase === 'scripts') headerText = 'Generating scripts...';
      else headerText = s.phaseDetail || 'Starting generation...';
    } else {
      headerText = 'Generating content for all 5 days...';
    }
  }
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
  html += '<div style="font-size:13px;font-weight:600">' + headerText + '</div>';
  html += '<div style="font-size:11px;color:var(--dim);font-family:monospace;text-align:right">';
  if (elapsed) html += elapsed;
  if (s.running) html += ' <span style="color:var(--accent2)">' + israelTime + '</span>';
  html += '</div>';
  html += '</div>';

  // Agent spotlight - show what's happening RIGHT NOW
  if (s.running) {
    let spotlightText = '';
    const agents = s.currentAgents || [];
    if (agents.length > 0) {
      spotlightText = agents.map(a => AGENT_LABELS[a] || a.replace(/_/g, ' ')).join(' + ');
    } else if (s.phase === 'planning') {
      spotlightText = AGENT_LABELS['weekly_planner'] || 'Planning Week';
    } else if (s.phase === 'building_guide') {
      spotlightText = AGENT_LABELS['docx_guide_builder'] || 'Building Guide';
    } else if (s.phase === 'scripts') {
      spotlightText = s.phaseDetail || 'Generating scripts...';
    } else if (s.phaseDetail) {
      spotlightText = s.phaseDetail;
    }
    if (spotlightText) {
      html += '<div style="font-size:12px;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:6px">';
      html += '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 1.5s infinite"></span>';
      html += esc(spotlightText);
      html += '</div>';
    }
  }

  // Show weekly theme + gift theme once available (unified mode)
  if (s.unified && s.weeklyTheme) {
    html += '<div style="background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px">';
    html += '<div style="font-size:11px;color:var(--dim);margin-bottom:4px">WEEKLY THEME</div>';
    html += '<div style="font-size:13px;font-weight:600;color:var(--accent2)">' + esc(s.weeklyTheme) + '</div>';
    if (s.giftTheme) {
      html += '<div style="font-size:11px;color:var(--dim);margin-top:6px">GIFT/GUIDE</div>';
      let giftStr = '';
      if (typeof s.giftTheme === 'string') giftStr = s.giftTheme;
      else if (typeof s.giftTheme === 'object') giftStr = s.giftTheme.title || s.giftTheme.guide_title || s.giftTheme.name || JSON.stringify(s.giftTheme).slice(0, 100);
      if (giftStr) html += '<div style="font-size:12px;color:var(--green)">' + esc(giftStr) + '</div>';
    }
    if (s.weeklyKeyword) {
      html += '<div style="font-size:11px;color:var(--dim);margin-top:4px">CTA KEYWORD: <span style="color:var(--yellow);font-weight:600">' + esc(s.weeklyKeyword) + '</span></div>';
    }
    html += '</div>';
  }

  // Phase progress bar (unified mode)
  if (s.unified && s.running) {
    const phases = ['planning', 'generating_days', 'building_guide'];
    const phaseLabels = ['Plan Week', 'Generate 5 Days', 'Build Guide'];
    const curIdx = phases.indexOf(s.phase);
    html += '<div style="display:flex;gap:4px;margin-bottom:12px">';
    for (let pi = 0; pi < phases.length; pi++) {
      const pct = pi < curIdx ? '100%' : (pi === curIdx ? (s.phase === 'generating_days' && s.current >= 0 ? Math.round(((s.current + 0.5) / 5) * 100) + '%' : '50%') : '0%');
      const bg = pi < curIdx ? 'var(--green)' : (pi === curIdx ? 'var(--blue)' : 'var(--border)');
      html += '<div style="flex:1;text-align:center">';
      html += '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px"><div style="height:100%;background:' + bg + ';width:' + pct + ';transition:width 0.3s"></div></div>';
      html += '<div style="font-size:10px;color:' + (pi === curIdx ? 'var(--text)' : 'var(--dim)') + ';font-weight:' + (pi === curIdx ? '600' : '400') + '">' + phaseLabels[pi] + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // Planner agent detail (during planning phase)
  if (s.unified && s.running && s.phase === 'planning' && s.plannerStepStatus && Object.keys(s.plannerStepStatus).length) {
    html += '<div style="background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:8px">Weekly Planner - Agent Steps</div>';
    for (const [agent, st] of Object.entries(s.plannerStepStatus)) {
      const label = AGENT_LABELS[agent] || agent.replace(/_/g, ' ');
      let icon, stColor;
      if (st === 'completed') { icon = 'Done'; stColor = 'var(--green)'; }
      else if (st === 'running') { icon = 'Running...'; stColor = 'var(--blue)'; }
      else { icon = 'Waiting'; stColor = 'var(--dim)'; }
      html += '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px">';
      html += '<span style="color:' + (st === 'running' ? 'var(--text)' : 'var(--dim)') + '">' + label + '</span>';
      html += '<span style="color:' + stColor + ';font-weight:600;font-size:11px">' + icon + '</span>';
      html += '</div>';
    }
    // Live log feed for planner
    html += _renderLogFeed(s.plannerStepLogs);
    html += '</div>';
  }

  // Day badges
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  for (let i = 0; i < 5; i++) {
    const r = s.results[i];
    let bg, color, label;
    if (r?.status === 'done') { bg = 'var(--green)'; color = '#000'; label = DAY_NAMES[i] + ' Done'; }
    else if (r?.status === 'failed') { bg = 'var(--red)'; color = '#fff'; label = DAY_NAMES[i] + ' Failed'; }
    else if (s.running && i === s.current) { bg = 'var(--blue)'; color = '#fff'; label = DAY_NAMES[i] + '...'; }
    else { bg = 'var(--border)'; color = 'var(--dim)'; label = DAY_NAMES[i]; }
    html += '<div style="padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;background:' + bg + ';color:' + color;
    if (s.running && i === s.current) html += ';border-left:3px solid var(--blue)';
    html += '">' + label + '</div>';
  }
  html += '</div>';

  // Current day agent-level detail (during generating_days phase)
  const cur = s.current >= 0 ? s.results[s.current] : null;
  if (s.running && cur?.stepStatus && Object.keys(cur.stepStatus).length > 0) {
    const steps = cur.stepStatus;
    html += '<div style="background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:8px">' + DAY_NAMES[s.current] + ' - Pipeline Steps</div>';
    const entries = Object.entries(steps);
    const total = entries.length;
    const completed = entries.filter(([,v]) => v === 'completed' || v === 'skipped').length;
    html += '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px">';
    html += '<div style="height:100%;background:var(--green);width:' + Math.round((completed/total)*100) + '%;transition:width 0.3s"></div>';
    html += '</div>';
    for (const [agent, st] of entries) {
      const label = AGENT_LABELS[agent] || agent.replace(/_/g, ' ');
      let icon, stColor;
      if (st === 'completed') { icon = 'Done'; stColor = 'var(--green)'; }
      else if (st === 'running') { icon = 'Running...'; stColor = 'var(--blue)'; }
      else if (st === 'failed') { icon = 'Failed'; stColor = 'var(--red)'; }
      else if (st === 'skipped') { icon = 'Skipped'; stColor = 'var(--yellow)'; }
      else { icon = 'Waiting'; stColor = 'var(--dim)'; }
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">';
      html += '<span style="color:' + (st === 'running' ? 'var(--text)' : 'var(--dim)') + ';font-weight:' + (st === 'running' ? '600' : '400') + '">';
      if (st === 'running') html += '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);margin-right:6px;animation:pulse 1.5s infinite"></span>';
      html += label + '</span>';
      html += '<span style="color:' + stColor + ';font-weight:600;font-size:11px">' + icon + '</span>';
      html += '</div>';
    }
    // Live log feed for current day agents
    html += _renderLogFeed(s.dayStepLogs);
    html += '</div>';
  }

  // Guide building detail
  if (s.running && s.phase === 'building_guide' && s.guideStepStatus && Object.keys(s.guideStepStatus).length) {
    html += '<div style="background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:8px">Guide Builder</div>';
    for (const [agent, st] of Object.entries(s.guideStepStatus)) {
      const label = AGENT_LABELS[agent] || agent.replace(/_/g, ' ');
      let icon, stColor;
      if (st === 'completed') { icon = 'Done'; stColor = 'var(--green)'; }
      else if (st === 'running') { icon = 'Running...'; stColor = 'var(--blue)'; }
      else { icon = 'Waiting'; stColor = 'var(--dim)'; }
      html += '<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px">';
      html += '<span style="color:' + (st === 'running' ? 'var(--text)' : 'var(--dim)') + '">' + label + '</span>';
      html += '<span style="color:' + stColor + ';font-weight:600;font-size:11px">' + icon + '</span>';
      html += '</div>';
    }
    html += _renderLogFeed(s.guideStepLogs);
    html += '</div>';
  }

  if (!s.running) {
    const done = s.results.filter(r => r?.status === 'done').length;
    const fail = s.results.filter(r => r?.status === 'failed').length;
    html += '<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    if (s.phase === 'failed' || s.phase === 'completed' || s.phase === 'interrupted') {
      const phaseColor = s.phase === 'completed' ? 'var(--green)' : (s.phase === 'interrupted' ? 'var(--yellow)' : 'var(--red)');
      const phaseMsg = s.phase === 'completed' ? done + '/5 completed + guide built (' + elapsed + ')' : (s.phase === 'interrupted' ? 'Interrupted: ' + (s.phaseDetail || 'Server restarted during generation') : 'Failed: ' + (s.errorMsg || s.phaseDetail || 'Unknown error'));
      html += '<span style="font-size:13px;color:' + phaseColor + ';font-weight:600">' + phaseMsg + '</span>';
    } else {
      html += '<span style="font-size:13px;color:var(--green);font-weight:600">' + done + '/5 completed</span>';
      if (fail) html += '<span style="font-size:13px;color:var(--red)">' + fail + ' failed</span>';
    }
    if (s.totalCost) html += '<span style="font-size:13px;color:var(--accent2)">Total: $' + s.totalCost.toFixed(2) + '</span>';
    for (let fi = 0; fi < 5; fi++) {
      if (s.results[fi]?.status === 'failed') {
        html += '<button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="retryOneDay(' + fi + ')">Retry ' + DAY_NAMES[fi] + '</button>';
      }
    }
    html += '<button class="btn btn-dim" style="margin-left:auto;font-size:12px" onclick="genAllState=null;saveGenAllState();renderGenAllProgress()">Dismiss</button>';
    html += '</div>';
    // Show error details for failed days
    for (let fi = 0; fi < 5; fi++) {
      if (s.results[fi]?.status === 'failed' && s.results[fi]?.errorMsg) {
        html += '<div style="margin-top:6px;padding:8px 12px;background:#2d0000;border:1px solid var(--red);border-radius:6px;font-size:12px">';
        html += '<span style="color:var(--red);font-weight:600">' + DAY_NAMES[fi] + ':</span> <span style="color:#fecaca">' + esc(s.results[fi].errorMsg.substring(0, 200)) + '</span>';
        html += '</div>';
      }
    }
  }
  html += '</div>';
  el.innerHTML = html;
  // Update button state
  const btn = document.getElementById('gen-all-btn');
  if (btn) {
    btn.disabled = s.running;
    if (s.unified && s.running) {
      const agents = s.currentAgents || [];
      if (agents.length > 0) {
        const agentLabel = AGENT_LABELS[agents[0]] || agents[0].replace(/_/g, ' ');
        btn.textContent = agentLabel + '... (' + ((s.current >= 0 ? s.current : 0) + 1) + '/5)';
      } else if (s.phase === 'planning') btn.textContent = 'Planning week...';
      else if (s.phase === 'generating_days') btn.textContent = 'Day ' + ((s.current >= 0 ? s.current : 0) + 1) + '/5...';
      else if (s.phase === 'building_guide') btn.textContent = 'Building guide...';
      else if (s.phase === 'scripts') btn.textContent = 'Generating scripts...';
      else btn.textContent = 'Starting...';
    } else if (s.running) {
      const curAgent = cur?.stepStatus ? Object.entries(cur.stepStatus).find(([,v]) => v === 'running') : null;
      const agentLabel = curAgent ? (AGENT_LABELS[curAgent[0]] || curAgent[0]) : '';
      btn.textContent = agentLabel ? agentLabel + '... (' + (s.current+1) + '/5)' : 'Generating ' + DAY_NAMES[s.current] + '... (' + (s.current+1) + '/5)';
    } else {
      btn.textContent = 'Generate All Days';
    }
  }
}

// ─── Weekly Walking-Video Panel ───────────────────────────────────────────────

let _walkingPipelineRunId = null;
let _walkingPollTimer = null;

async function renderWalkingVideoPanel(entries, monday) {
  const panel = document.getElementById('weekly-walking-panel');
  if (!panel) return;

  // Only show if at least one entry is a walking-video day
  const videoEntries = (entries || []).filter(e => e && (
    (e.plan_context && (e.plan_context.content_format || '').toLowerCase().includes('walking')) ||
    e.walking_video_script_id
  ));
  if (!videoEntries.length) { panel.style.display = 'none'; return; }

  const weeklyPlanId = videoEntries.find(e => e.weekly_plan_id)?.weekly_plan_id;
  const allApproved = videoEntries.length >= 5 && videoEntries.every(e => e.walking_video_script_status === 'approved' || (window._walkingScriptStatuses && window._walkingScriptStatuses[e.walking_video_script_id] === 'approved'));

  // Fetch recording state if plan ID is known
  let recording = null;
  if (weeklyPlanId) {
    try { recording = await api('/video-scripts/walking/weekly/' + weeklyPlanId + '/recording'); } catch(_) {}
  }

  const hasRecording = recording && recording.status !== undefined;
  const canEdit = hasRecording && recording.status === 'uploaded';
  const isPipelineRunning = hasRecording && ['transcribing','aligning','splitting','editing'].includes(recording.status);
  const isDone = hasRecording && recording.status === 'done';

  const escP = s => String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

  // Status color
  const statusColors = {uploaded:'var(--blue)',transcribing:'var(--yellow)',aligning:'var(--yellow)',splitting:'var(--yellow)',editing:'var(--yellow)',done:'var(--green)',failed:'var(--red)'};
  const statusColor = statusColors[recording?.status] || 'var(--dim)';
  const statusLabel = (recording?.status||'none').toUpperCase();

        const stateLabels = {pending:'Queued',ingesting:'Extracting audio...',understanding:'Analysing video...',editing:'Planning cuts...',rendering:'Rendering MP4...',render_done:'Done',ingest_failed:'Ingest failed',edit_failed:'Edit failed',render_failed:'Render failed'};
        const clipLabel = stateLabels[clipStatus?.state] || (clipStatus?.state ? clipStatus.state.replace(/_/g,' ') : 'Waiting...');
        html += '<div style="background:rgba(255,255,255,0.04);border:1px solid ' + clipColor + ';border-radius:6px;padding:6px 10px;min-width:90px;text-align:center">';

        html += '<div style="font-size:11px;font-weight:600;color:' + clipColor + '">' + escP(clipLabel) + '</div>';
        html += '</div>';
      });

    }

  html += '</div>';
  panel.style.display = 'block';

  // Start polling if pipeline is running
  if (isPipelineRunning && weeklyPlanId) {

    _startWalkingPipelinePoll(weeklyPlanId, entries, monday);
  }
}

function _startWalkingPipelinePoll(weeklyPlanId, entries, monday) {
  if (_walkingPollTimer) clearInterval(_walkingPollTimer);
  _walkingPollTimer = setInterval(async () => {
    try {
      const rec = await api('/video-scripts/walking/weekly/' + weeklyPlanId + '/recording');
      // Poll per-clip job statuses
      if (rec.cutsense_jobs && Object.keys(rec.cutsense_jobs).length) {
        window._clipStatuses = window._clipStatuses || {};
        for (const [scriptId, jobId] of Object.entries(rec.cutsense_jobs)) {
          try {
            const st = await fetch('/api/v1/video-scripts/cutsense-proxy/jobs/' + jobId + '/status').then(r => r.json());
            window._clipStatuses[jobId] = st;
          } catch(_) {}
        }
      }
      // Re-render panel with latest state
      await renderWalkingVideoPanel(entries, monday);
      // Stop polling when terminal state reached
      if (!['transcribing','aligning','splitting','editing'].includes(rec.status)) {
        clearInterval(_walkingPollTimer);
        _walkingPollTimer = null;
      }
    } catch(_) {}
  }, 3000);
}

// ============================================================================
// Upload helpers - real progress + 3 GB cap + chunked/resumable for big files
// ============================================================================
//
// uploadFileXhr(url, file, opts) - single-shot via XMLHttpRequest with real
//   xhr.upload.onprogress events. Use for files <= 100 MB or where the
//   destination endpoint isn't wired into the chunked uploader.
//
// uploadFileChunked(file, intent, targetId, opts) - resumable upload via
//   POST /api/v1/uploads/init -> PATCH /uploads/{id} (5 MB chunks) -> POST
//   /uploads/{id}/finalize. Survives wifi drops (each chunk is its own HTTP
//   request, server tracks byte offset). Use for video files (typically
//   100 MB - 3 GB).
//
// opts.onProgress({percent, bytesSent, totalBytes, elapsedSec, mbPerSec})
//   fires throughout. opts.signal accepts an AbortSignal.

async function uploadFileXhr(url, file, opts) {
  opts = opts || {};
  const onProgress = opts.onProgress || (() => {});
  const start = Date.now();
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open(opts.method || 'POST', url);
    xhr.responseType = 'json';
    if (opts.headers) {
      for (const [k, v] of Object.entries(opts.headers)) xhr.setRequestHeader(k, v);
    }
    xhr.upload.onprogress = (e) => {
      if (!e.lengthComputable) return;
      const elapsedSec = (Date.now() - start) / 1000;
      onProgress({
        percent: (e.loaded / e.total) * 100,
        bytesSent: e.loaded,
        totalBytes: e.total,
        elapsedSec,
        mbPerSec: elapsedSec > 0 ? (e.loaded / 1_048_576) / elapsedSec : 0,
      });
    };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve(xhr.response || {});
      } else {
        const body = xhr.response;
        const detail = (body && body.detail) || xhr.statusText || ('HTTP ' + xhr.status);
        reject(new Error('HTTP ' + xhr.status + ': ' + (typeof detail === 'string' ? detail : JSON.stringify(detail))));
      }
    };
    xhr.onerror = () => reject(new Error('Network error during upload'));
    xhr.onabort = () => reject(new Error('Upload aborted'));
    if (opts.signal) {
      opts.signal.addEventListener('abort', () => xhr.abort(), { once: true });
    }
    if (opts.body !== undefined) {
      xhr.send(opts.body);
    } else {
      const fd = new FormData();
      fd.append('file', file);
      xhr.send(fd);
    }
  });
}

async function uploadFileChunked(file, intent, targetId, opts) {
  opts = opts || {};
  const onProgress = opts.onProgress || (() => {});
  const start = Date.now();

  const initResp = await fetch('/api/v1/uploads/init', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filename: file.name, total_size: file.size, intent}),
  });
  if (!initResp.ok) {
    const t = await initResp.text();
    throw new Error('init failed: HTTP ' + initResp.status + ': ' + t.slice(0, 300));
  }
  const init = await initResp.json();
  const uploadId = init.upload_id;
  const chunkSize = init.chunk_size || 5 * 1024 * 1024;

  let offset = init.next_offset || 0;
  while (offset < file.size) {
    if (opts.signal && opts.signal.aborted) {
      try { await fetch('/api/v1/uploads/' + uploadId, {method: 'DELETE'}); } catch(_){}
      throw new Error('Upload aborted');
    }
    const end = Math.min(offset + chunkSize, file.size);
    const chunk = file.slice(offset, end);
    const patchResp = await fetch('/api/v1/uploads/' + uploadId, {
      method: 'PATCH',
      headers: {
        'Upload-Offset': String(offset),
        'Content-Type': 'application/octet-stream',
      },
      body: chunk,
    });
    if (!patchResp.ok) {
      const t = await patchResp.text();
      throw new Error('chunk PATCH failed at offset ' + offset + ': HTTP ' + patchResp.status + ': ' + t.slice(0, 300));
    }
    const patch = await patchResp.json();
    offset = patch.next_offset;
    const elapsedSec = (Date.now() - start) / 1000;
    onProgress({
      percent: (offset / file.size) * 100,
      bytesSent: offset,
      totalBytes: file.size,
      elapsedSec,
      mbPerSec: elapsedSec > 0 ? (offset / 1_048_576) / elapsedSec : 0,
    });
  }

  const finResp = await fetch('/api/v1/uploads/' + uploadId + '/finalize', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({target_id: targetId}),
  });
  if (!finResp.ok) {
    const t = await finResp.text();
    throw new Error('finalize failed: HTTP ' + finResp.status + ': ' + t.slice(0, 300));
  }
  return await finResp.json();
}

function _formatUploadProgress(filename, p) {
  const sentMB = (p.bytesSent / 1_048_576).toFixed(0);
  const totalMB = (p.totalBytes / 1_048_576).toFixed(0);
  const pct = p.percent.toFixed(1);
  const speed = p.mbPerSec.toFixed(1);
  const remainSec = p.mbPerSec > 0 ? Math.round(((p.totalBytes - p.bytesSent) / 1_048_576) / p.mbPerSec) : 0;
  const remainStr = remainSec > 60 ? Math.floor(remainSec/60) + 'm' + (remainSec%60).toString().padStart(2,'0') + 's' : remainSec + 's';
  return 'Uploading ' + filename + ': ' + sentMB + '/' + totalMB + ' MB (' + pct + '%) @ ' + speed + ' MB/s, ~' + remainStr + ' left';
}

async function uploadWeeklyRecording(event, weeklyPlanId) {
  const file = event.target.files[0];
  if (!file || !weeklyPlanId) return;

  const panel = document.getElementById('weekly-walking-panel');
  const btn = event.target.closest('label');
  if (btn) { btn.style.opacity = '0.6'; btn.style.pointerEvents = 'none'; }

  let progressEl = panel ? panel.querySelector('[data-upload-progress]') : null;
  if (!progressEl && panel) {
    progressEl = document.createElement('div');
    progressEl.setAttribute('data-upload-progress', '1');
    progressEl.style.cssText = 'margin-top:10px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:6px;border-left:3px solid var(--yellow);font-size:12px;color:var(--yellow)';
    panel.querySelector('div').appendChild(progressEl);
  }
  const sizeMB = (file.size / 1_048_576).toFixed(1);
  const updateProgress = (msg) => { if (progressEl) progressEl.textContent = msg; };
  updateProgress('Initializing upload of ' + file.name + ' (' + sizeMB + ' MB)...');

  try {
    const result = await uploadFileChunked(file, 'walking_weekly', weeklyPlanId, {
      onProgress: (p) => updateProgress(_formatUploadProgress(file.name, p)),
    });
    updateProgress('Upload complete (' + sizeMB + ' MB). Ready to split & edit.');
    await renderWeek();
  } catch(err) {
    if (progressEl) { progressEl.style.borderLeftColor = 'var(--red)'; progressEl.style.color = 'var(--red)'; progressEl.textContent = 'Upload failed: ' + err.message; }
    if (window._tceShowErr) window._tceShowErr('Upload failed: ' + err.message);
    if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
  }
}

async function runWeeklySplitEdit(weeklyPlanId) {

  }
}

async function _renderSwapBody(entryId) {
  const body = document.getElementById('topic-swap-body');
  if (!body) return;
  body.textContent = 'Loading alternatives...';
  body.style.color = 'var(--dim)';
  try {
    const options = await api('/calendar/' + entryId + '/options');
    body.replaceChildren();
    body.style.color = '';
    if (!options || options.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:20px;text-align:center;color:var(--dim);font-size:13px';
      empty.textContent = 'No alternatives saved for this day yet. Click "Replace All 3" to generate fresh ones.';
      body.appendChild(empty);
      return;
    }
    const desc = document.createElement('div');
    desc.style.cssText = 'color:var(--dim);font-size:12px;margin-bottom:14px';
    desc.textContent = 'Pick a different topic for this day. The currently-selected one is highlighted. Use Replace All 3 to generate fresh options.';
    body.appendChild(desc);
    const list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:10px';
    // Sort: selected first, then most recent (highest option_index)
    const sorted = options.slice().sort((a, b) => {
      if (a.is_selected !== b.is_selected) return a.is_selected ? -1 : 1;
      return (b.option_index || 0) - (a.option_index || 0);
    });
    sorted.forEach((o) => {
      const opt = document.createElement('div');
      const sel = !!o.is_selected;
      opt.style.cssText = 'border:1px solid ' + (sel ? 'var(--accent)' : 'var(--border)') + ';border-radius:8px;padding:12px 14px;background:' + (sel ? 'rgba(99,102,241,0.08)' : 'var(--bg)') + ';cursor:' + (sel ? 'default' : 'pointer') + ';transition:border-color 0.15s';
      if (!sel) opt.onmouseenter = () => { opt.style.borderColor = 'var(--accent)'; };
      if (!sel) opt.onmouseleave = () => { opt.style.borderColor = 'var(--border)'; };
      const hdr = document.createElement('div');
      hdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px';
      const rank = document.createElement('span');
      rank.textContent = sel ? 'CURRENT' : 'OPTION';
      rank.style.cssText = 'font-size:10px;font-weight:700;letter-spacing:1px;color:' + (sel ? 'var(--accent)' : 'var(--dim)');
      hdr.appendChild(rank);
      if (!sel) {
        const pickBtn = document.createElement('button');
        pickBtn.className = 'btn btn-primary';
        pickBtn.textContent = 'Use this topic';
        pickBtn.style.cssText = 'padding:4px 12px;font-size:11px';
        pickBtn.onclick = (ev) => { ev.stopPropagation(); pickTopicOption(entryId, o.option_index, pickBtn); };
        hdr.appendChild(pickBtn);
      }
      opt.appendChild(hdr);
      const topic = document.createElement('div');
      topic.textContent = o.topic || '(no topic)';
      topic.style.cssText = 'font-size:14px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:4px';
      opt.appendChild(topic);
      const thesis = (o.plan_context && o.plan_context.thesis) || '';
      if (thesis) {
        const t = document.createElement('div');
        t.textContent = thesis;
        t.style.cssText = 'font-size:12px;color:var(--dim);line-height:1.4';
        opt.appendChild(t);
      }
      if (!sel) opt.onclick = () => pickTopicOption(entryId, o.option_index, opt);
      list.appendChild(opt);
    });
    body.appendChild(list);
  } catch (err) {
    body.style.color = 'var(--red)';
    body.textContent = 'Failed to load alternatives: ' + (err.message || err);
  }

// Replace All 3: regenerate non-selected non-packaged alternatives via the

function saveGenAllState() {
  if (genAllState) sessionStorage.setItem('genAllState', JSON.stringify(genAllState));
  else sessionStorage.removeItem('genAllState');
}
async function restoreGenAllState() {
  // First check sessionStorage for same-tab refresh
  try {
    const saved = sessionStorage.getItem('genAllState');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.running) {
        genAllState = parsed;
        if (parsed.unified && parsed.weekId) {
          resumeUnifiedGenAll();
        } else {
          resumeGenAll();
        }
        renderGenAllProgress();
        return;
      } else {
        sessionStorage.removeItem('genAllState');
      }
    }
  } catch { /* ignore */ }
  // No session state - ask server if a generation is currently active
  try {
    const active = await api('/pipeline/generate-week/active');
    if (active.active && active.week_id) {
      const isInterrupted = active.status === 'interrupted' || active.phase === 'interrupted';
      genAllState = { running: !isInterrupted, unified: true, weekId: active.week_id, total: 5, current: active.current_day >= 0 ? active.current_day : 0, results: [], phase: active.phase || 'running', phaseDetail: active.phase_detail || 'Generation in progress...', startTime: Date.now(), weeklyTheme: active.weekly_theme || '', giftTheme: active.gift_theme || '', weeklyKeyword: active.weekly_keyword || '' };
      if (active.day_run_ids) {
        for (let i = 0; i < active.day_run_ids.length; i++) {
          genAllState.results[i] = { day: DAY_NAMES[i], status: 'done', runId: active.day_run_ids[i] };
        }
      }
      if (isInterrupted) {
        genAllState.errorMsg = 'Server restarted during generation';
        genAllState.phaseDetail = 'Generation was interrupted (server restarted). You can re-run Generate from the planner.';
      }
      saveGenAllState();
      if (!isInterrupted) {
        resumeUnifiedGenAll();
      }
      renderGenAllProgress();
    }
  } catch { /* server might not support /active yet */ }
}
async function resumeUnifiedGenAll() {
  if (!genAllState?.weekId) { genAllState.running = false; saveGenAllState(); renderGenAllProgress(); return; }
  let done = false;
  let failCount = 0;
  while (!done) {
    await new Promise(ok => setTimeout(ok, 2500));
    try {
      const st = await api('/pipeline/generate-week/' + genAllState.weekId + '/status');
      failCount = 0;
      genAllState.phase = st.phase || 'unknown';
      genAllState.phaseDetail = st.phase_detail || '';
      genAllState.current = st.current_day >= 0 ? st.current_day : genAllState.current;
      genAllState.startedAt = st.started_at || genAllState.startedAt || null;
      genAllState.currentAgents = st.current_agents || [];
      genAllState.dayStepLogs = st.day_step_logs || {};
      genAllState.plannerStepStatus = st.planner_step_status || genAllState.plannerStepStatus || {};
      genAllState.plannerStepLogs = st.planner_step_logs || {};
      genAllState.guideStepStatus = st.guide_step_status || {};
      genAllState.guideStepLogs = st.guide_step_logs || {};
      if (st.weekly_theme) genAllState.weeklyTheme = st.weekly_theme;
      if (st.gift_theme) genAllState.giftTheme = st.gift_theme;
      if (st.weekly_keyword) genAllState.weeklyKeyword = st.weekly_keyword;
      if (st.day_run_ids) {
        for (let i = 0; i < st.day_run_ids.length; i++) {
          if (!genAllState.results[i]) genAllState.results[i] = { day: DAY_NAMES[i], status: 'done', runId: st.day_run_ids[i] };
        }
      }
      // Enrich current day's step status from inline data
      if (st.phase === 'generating_days' && st.current_day >= 0 && st.day_step_status) {
        if (!genAllState.results[st.current_day]) genAllState.results[st.current_day] = { day: DAY_NAMES[st.current_day], status: 'running', stepStatus: {} };
        else genAllState.results[st.current_day].status = 'running';
        genAllState.results[st.current_day].stepStatus = st.day_step_status;
      }
      done = st.status === 'completed' || st.status === 'failed' || st.status === 'interrupted';
      if (st.status === 'failed') genAllState.errorMsg = st.error || 'Unknown error';
      if (st.status === 'interrupted') { genAllState.phase = 'interrupted'; genAllState.phaseDetail = 'Generation was interrupted (server restarted). You can re-run Generate from the planner.'; genAllState.errorMsg = 'Server restarted during generation'; }
    } catch (e) {
      failCount++;
      if (failCount >= 3) {
        // Server restarted or week ID is stale - stop polling
        genAllState.phase = 'failed';
        genAllState.phaseDetail = 'Lost connection to pipeline (server may have restarted)';
        done = true;
      }
    }
    saveGenAllState();
    renderGenAllProgress();
  }
  genAllState.running = false;
  saveGenAllState();
  renderGenAllProgress();
  renderWeek();
}
async function resumeGenAll() {
  // Resume polling for the current day's run_id
  const cur = genAllState.results[genAllState.current];
  if (!cur?.runId) { genAllState.running = false; saveGenAllState(); renderGenAllProgress(); return; }
  // Poll current day to completion
  let done = false;
  while (!done) {
    await new Promise(ok => setTimeout(ok, 2000));
    try {
      const status = await api('/pipeline/' + cur.runId + '/status');
      cur.stepStatus = status.step_status || {};
      const vals = Object.values(cur.stepStatus);
      done = !vals.some(s => s === 'pending' || s === 'running');
      if (done) {
        const hasFail = vals.some(s => s === 'failed');
        cur.status = hasFail ? 'failed' : 'done';
        toast(DAY_NAMES[genAllState.current] + (hasFail ? ' finished with errors' : ' done!'), !hasFail);
      }
    } catch { done = true; cur.status = 'failed'; }
    saveGenAllState();
    renderGenAllProgress();
  }
  // Continue with remaining days
  for (let i = genAllState.current + 1; i < 5; i++) {
    await runOneDay(i);
  }
  genAllState.running = false;
  saveGenAllState();
  renderGenAllProgress();
  renderWeek();
}
async function runOneDay(i) {
  genAllState.current = i;
  genAllState.results[i] = { day: DAY_NAMES[i], status: 'running', stepStatus: {}, startTime: Date.now() };
  saveGenAllState();
  renderGenAllProgress();
  try {
    const r = await api('/pipeline/run', {
      method: 'POST',
      body: JSON.stringify({ workflow: 'daily_content', context: { day_of_week: i } }),
    });
    genAllState.results[i].runId = r.run_id;
    saveGenAllState();
    let done = false;
    while (!done) {
      await new Promise(ok => setTimeout(ok, 2000));
      try {
        const status = await api('/pipeline/' + r.run_id + '/status');
        genAllState.results[i].stepStatus = status.step_status || {};
        const vals = Object.values(status.step_status || {});
        done = !vals.some(s => s === 'pending' || s === 'running');
        if (done) {
          const hasFail = vals.some(s => s === 'failed');
          genAllState.results[i].status = hasFail ? 'failed' : 'done';
          if (hasFail && status.step_errors) {
            const errParts = Object.entries(status.step_errors).map(([k,v]) => k.replace(/_/g,' ') + ': ' + v);
            genAllState.results[i].errorMsg = errParts.join('; ');
          }
          toast(DAY_NAMES[i] + (hasFail ? ' finished with errors' : ' done!'), !hasFail);
        }
      } catch (pollErr) { done = true; genAllState.results[i].status = 'failed'; genAllState.results[i].errorMsg = pollErr.message || 'Connection lost'; }
      saveGenAllState();
      renderGenAllProgress();
    }
  } catch (e) {
    genAllState.results[i] = { day: DAY_NAMES[i], status: 'failed', errorMsg: e.message || 'Pipeline start failed' };
    toast(DAY_NAMES[i] + ' failed: ' + e.message, false);
    saveGenAllState();
    renderGenAllProgress();
  }
}
async function generateAllDays() {
  genAllState = { running: true, current: -1, total: 5, startTime: Date.now(), results: [], totalCost: 0, unified: true, weekId: null, phase: 'starting', phaseDetail: 'Initializing unified weekly generation...', weeklyTheme: null, giftTheme: null, weeklyKeyword: null };

      method: 'POST',

    });
    genAllState.weekId = r.week_id;
    saveGenAllState();
    // Poll for status
    let done = false;
    let pollFailCount = 0;
    while (!done) {
      await new Promise(ok => setTimeout(ok, 2500));
      try {
        const st = await api('/pipeline/generate-week/' + r.week_id + '/status');
        pollFailCount = 0;

        if (st.day_run_ids) {

        }

        }
      } catch (pollErr) {
        pollFailCount++;
        if (pollFailCount >= 5) {
          genAllState.phase = 'failed';

        }
      }

function viewPackage(pkgId, dayNum) {
  // Set the day filter - use explicit dayNum if provided, else try cache
  if (dayNum !== undefined && dayNum !== null) {
    pkgDayFilter = dayNum;
  } else if (_pkgDayMapCache && _pkgDayMapCache[pkgId]) {
    pkgDayFilter = _pkgDayMapCache[pkgId].day;
  } else {
    // Standalone packages (Library / Start-from-Something) have no calendar day,
    // and the day cache may also be empty on first visit. Default to All so the
    // target card is guaranteed to be in the rendered list for scrollIntoView.
    pkgDayFilter = null;
  }
  // Clear source filter too in case it would hide this package.
  pkgSourceFilter = '';
  // Mark this card as "keep open" so the IntersectionObserver doesn't collapse
  // it the moment the user scrolls. expandedPkgs drives the initial expansion
  // after re-render.
  expandedPkgs.add(pkgId);
  // Switch to packages tab
  currentTab = 'packages';
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'packages'));
  render();
  // Poll for the filtered cache to populate (renderPackages is async; the
  // fetch+filter writes _pkgFilteredCache when done). Bounded retry so we
  // don't loop forever if the tab errors out.
  const _focusOnCard = (attempt) => {
    const cache = _pkgFilteredCache;
    if (!cache || !cache.length) {
      if (attempt < 20) return setTimeout(() => _focusOnCard(attempt + 1), 150);
      return;
    }
    const idx = cache.findIndex(x => x.id === pkgId);
    if (idx >= 0) {
      const targetPage = Math.floor(idx / PKG_PAGE_SIZE) + 1;
      if (targetPage !== pkgPage) {
        pkgPage = targetPage;
        _renderPkgFromCache();
      }
    }
    const card = document.getElementById('pkg-' + pkgId);
    if (card && card.classList.contains('pkg-stub')) togglePkgExpand(pkgId);
    const finalCard = document.getElementById('pkg-' + pkgId);
    if (finalCard) {
      finalCard.dataset.keepOpen = '1';
      finalCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      finalCard.style.outline = '2px solid var(--accent)';
      setTimeout(() => finalCard.style.outline = '', 3000);
    }
  };
  setTimeout(() => _focusOnCard(0), 100);
}

// Inline walking-video generation state, keyed by calendar entry id so multiple
// cards can show independent progress without clobbering each other.
// Also persisted to localStorage (key tce_inflight_video_runs) so page refresh
// + tab switches resume correctly. Map shape: { entryId: { runId, startedAt } }
const _videoGenState = {};

function _loadInflightVideoMap() {
  try {
    const raw = localStorage.getItem('tce_inflight_video_runs');
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function _saveInflightVideoMap(map) {
  try {
    if (Object.keys(map).length === 0) localStorage.removeItem('tce_inflight_video_runs');
    else localStorage.setItem('tce_inflight_video_runs', JSON.stringify(map));
  } catch { /* quota etc - ignore */ }
}
function _rememberInflight(entryId, runId, startedAt) {
  const m = _loadInflightVideoMap();
  m[entryId] = { runId, startedAt };
  _saveInflightVideoMap(m);
}
function _forgetInflight(entryId) {
  const m = _loadInflightVideoMap();
  delete m[entryId];
  _saveInflightVideoMap(m);
}
function _isInflight(entryId) {
  const m = _loadInflightVideoMap();
  const rec = m[entryId];
  if (!rec) return null;
  // Treat runs older than 10 minutes as stale (caller can clear)
  if (Date.now() - (rec.startedAt || 0) > 10 * 60 * 1000) return null;
  return rec;
}

// Pending video entries: entry IDs queued by generateFromPlan but not yet
// started. Written before the loop, cleared per-entry as each finishes.
// On renderWeek restore, any survivors that aren't already inflight get
// re-triggered so a page refresh mid-loop loses no work.
function _savePendingVideoEntries(ids) {
  try {
    if (!ids || !ids.length) localStorage.removeItem('tce_pending_video_entries');
    else localStorage.setItem('tce_pending_video_entries', JSON.stringify(ids));
  } catch { /* quota - ignore */ }
}
function _loadPendingVideoEntries() {
  try { const r = localStorage.getItem('tce_pending_video_entries'); return r ? JSON.parse(r) : []; } catch { return []; }
}
function _clearPendingVideoEntry(entryId) {
  _savePendingVideoEntries(_loadPendingVideoEntries().filter(id => id !== entryId));
}

async function _resumePendingVideoEntries() {
  const pending = _loadPendingVideoEntries();
  if (!pending.length) return;
  const inflight = _loadInflightVideoMap();
  const byId = window._weekEntriesById || {};
  const toResume = pending.filter(entryId => {
    if (inflight[entryId]) return false; // _resumeInflightVideoRuns already owns it
    const entry = byId[entryId];
    if (!entry) return false; // not this week - skip until the right week loads
    if (entry.walking_video_script_id) { _clearPendingVideoEntry(entryId); return false; } // already done
    return true;
  });
  if (!toResume.length) return;
  toast('Resuming ' + toResume.length + ' video script(s) from before the refresh...');
  for (const entryId of toResume) {
    try { await generateWalkingVideoInline(entryId, null); } catch { /* handled inside */ }
    _clearPendingVideoEntry(entryId);
  }
}

// Resume background poller for any entry still marked inflight at the time
// renderWeek runs. No visible UI change besides the card already rendering
// "Generating Xs..." from state; when the poll completes it swaps the
// card in place via _updateVideoCardToReady.
const _resumedPollers = new Set();
function _resumeInflightVideoRuns() {
  const m = _loadInflightVideoMap();
  for (const entryId of Object.keys(m)) {
    if (_resumedPollers.has(entryId)) continue;
    const rec = m[entryId];
    if (!rec || !rec.runId) continue;
    _resumedPollers.add(entryId);
    _videoGenState[entryId] = { status: 'running', startedAt: rec.startedAt || Date.now() };
    (async () => {
      let done = false, failed = false, scriptId = null, polls = 0;
      while (!done && polls < 240) {  // ~10 min
        await new Promise(ok => setTimeout(ok, 3000));
        try {
          const st = await api('/pipeline/start-walking-video/' + rec.runId + '/status');
          if (st.status === 'completed' || st.phase === 'completed') {
            done = true;
            scriptId = st.walking_video_script_id || null;
          } else if (st.status === 'failed' || st.phase === 'failed') {
            done = true; failed = true;
          }
        } catch { /* transient - keep polling */ }
        polls++;
      }
      _resumedPollers.delete(entryId);
      _forgetInflight(entryId);
      _videoGenState[entryId] = { status: failed ? 'failed' : 'done' };
      if (!failed && scriptId) {
        _updateVideoCardToReady(entryId, scriptId);
      } else if (failed) {
        // Card might still show "Generating" - force a targeted reset
        const cards = document.querySelectorAll('.day-card');
        for (const card of cards) {
          if (card.querySelector('[data-entry-inflight="' + entryId + '"]')) {
            // Trigger a full re-render since failure is rare and we don't
            // have a clean partial reset path
            renderWeek();
            break;
          }
        }
      }
    })();
  }
}

// Global 1s ticker that updates textContent of any visible "Generating Xs..."

setInterval(() => {

// Fire walking_video_from_plan for a single calendar entry (inline - no
// navigation to Video Studio). Uses the lean workflow (research -> writer)
// since the weekly planner already picked the angle/thesis.
//
// PERFORMANCE: updates only the triggering button's text in place. Does NOT
// re-render the whole week every poll (that caused flicker + jump). The
// full renderWeek() runs exactly ONCE at completion to swap Generate ->
// Package based on the new walking_video_script_id.
//
// Returns the completed script_id or null on failure.
async function generateWalkingVideoInline(entryId, btn) {
  const entry = (window._weekEntriesById || {})[entryId];
  if (!entry) { toast('Calendar entry not found', false); return null; }
  const topic = (entry.topic || '').trim() || '(no topic)';
  const startedAt = Date.now();
  _videoGenState[entryId] = { status: 'running', startedAt };

  // In-place button updater: keeps a live "Generating Xs..." timer on the
  // clicked button without re-rendering the week grid.
  let timerHandle = null;
  const updateBtn = () => {
    if (!btn) return;
    const secs = Math.round((Date.now() - startedAt) / 1000);
    btn.disabled = true;
    btn.textContent = 'Generating ' + secs + 's...';
  };
  if (btn) {
    updateBtn();
    timerHandle = setInterval(updateBtn, 1000);
  }

  try {
    const r = await api('/pipeline/start-walking-video', {
      method: 'POST',
      body: JSON.stringify({
        topic: topic,
        niche: 'general',
        duration_target_seconds: 90,
        calendar_entry_id: entryId,
      }),
    });
    const runId = r.run_id;
    _rememberInflight(entryId, runId, startedAt);
    let done = false, failed = false, scriptId = null;
    let polls = 0;
    while (!done && polls < 120) {
      await new Promise(ok => setTimeout(ok, 2500));
      try {
        const st = await api('/pipeline/start-walking-video/' + runId + '/status');
        if (st.status === 'completed' || st.phase === 'completed') {
          done = true;
          scriptId = st.walking_video_script_id || null;
        } else if (st.status === 'failed' || st.phase === 'failed') {
          done = true; failed = true;
          toast('Generation failed: ' + (st.error || 'unknown'), false);
        }
      } catch (e) { /* transient - keep polling silently */ }
      polls++;
    }
    if (timerHandle) clearInterval(timerHandle);
    _videoGenState[entryId] = { status: failed ? 'failed' : 'done' };
    _forgetInflight(entryId);
    if (failed) {
      if (btn) { btn.disabled = false; btn.textContent = 'Generate'; }
    } else if (scriptId) {
      // Targeted DOM update - no full week re-render. Find the card and
      // swap its button row in place so other cards don't repaint.
      _updateVideoCardToReady(entryId, scriptId);
      toast('Script ready for ' + (entry.day_of_week >= 0 ? DAY_NAMES[entry.day_of_week] : 'entry'));
    }
    return scriptId;
  } catch (e) {
    if (timerHandle) clearInterval(timerHandle);
    _videoGenState[entryId] = { status: 'failed' };
    _forgetInflight(entryId);
    toast('Failed: ' + e.message, false);
    if (btn) { btn.disabled = false; btn.textContent = 'Generate'; }
    return null;
  }
}

// Regenerate: fire a fresh script over the existing calendar entry. Backend
// writes the new script_id, overwriting walking_video_script_id on the entry.
async function regenerateWalkingVideo(entryId, btn) {
  if (!confirm('Replace the existing script with a new one?')) return;
  return generateWalkingVideoInline(entryId, btn);
}

// Swap a single video-day card from "Generating" state to "READY + Package"
// without touching other cards. Updates the local entry cache too so a
// future full renderWeek() will agree with the visible DOM.
function _updateVideoCardToReady(entryId, scriptId) {
  if (window._weekEntriesById && window._weekEntriesById[entryId]) {
    window._weekEntriesById[entryId].walking_video_script_id = scriptId;
    window._weekEntriesById[entryId].status = 'ready';
  }
  // Find the card in the grid by matching any button/element carrying the
  // entryId in its onclick. Cards have no data-entry-id attribute today,
  // so we walk via a known onclick signature.
  const nodes = document.querySelectorAll('.day-card');
  for (const card of nodes) {
    const match = card.querySelector('button[onclick*="' + entryId + '"]');
    if (!match) continue;
    // The button row is the last flex row in the card (status tag + buttons)
    const rows = card.querySelectorAll('div[style*="margin-top:auto"]');
    const btnRow = rows.length ? rows[rows.length - 1] : null;
    if (!btnRow) return;
    btnRow.innerHTML =
      '<button class="btn btn-green" style="padding:4px 10px;font-size:11px" onclick="openWalkingScriptDetail(\'' + scriptId + '\')">Package</button>' +
      '<button class="btn btn-dim" style="padding:4px 10px;font-size:11px" onclick="regenerateWalkingVideo(\'' + entryId + '\', this)">Regenerate</button>';
    return;
  }
}

// Jump straight to the walking-video detail view for a given script id.
// Used by the Week Planner calendar when the operator clicks "View Script"
// on a video-day card that has already generated a draft.
async function openWalkingScriptDetail(scriptId) {
  try {
    localStorage.setItem('tce_video_studio_subtab', 'library');
  } catch (e) { /* ignore */ }
  currentTab = 'video-studio';
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'video-studio'));
  // Render the shell first (Library pill active), then open the detail.
  await renderVideoStudio();
  await _openScriptDetail('walking', scriptId);
}

// Called from the Week Planner calendar when the operator clicks a video-day
// card. Stashes the topic in localStorage so the Walking sub-form auto-fills
// it on mount, then navigates to Video Studio.
function openVideoStudioForEntry(entryId, topic) {
  try {
    if (topic) localStorage.setItem('tce_video_prefill_topic', topic);
    if (entryId) localStorage.setItem('tce_video_prefill_entry_id', entryId);
    localStorage.setItem('tce_start_subtab', 'walking'); // legacy safety
    localStorage.setItem('tce_video_studio_subtab', 'walking');
  } catch (e) { /* ignore storage errors */ }
  currentTab = 'video-studio';
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'video-studio'));
  render();
}

async function renderVideoStudio() {
  const app = document.getElementById('app');
  if (!app) return;
  let sub = localStorage.getItem('tce_video_studio_subtab');
  if (!sub) sub = currentTab === 'video-lead' ? 'talking_head' : 'walking';
  const pills = [
    { id: 'walking', label: 'Walking (60-120s phone-held)' },
    { id: 'talking_head', label: 'Talking-head (5-7 min teleprompter)' },
    { id: 'library', label: 'Library' },
  ].map(p => {
    const a = p.id === sub;
    return '<button onclick="switchVideoStudioSubtab(&quot;' + p.id + '&quot;)" style="padding:10px 22px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:' + (a ? 'var(--accent)' : 'var(--card)') + ';color:' + (a ? '#fff' : 'var(--dim)') + ';transition:all 0.15s">' + p.label + '</button>';
  }).join('');
  app.innerHTML = `
    <div class="section" style="padding-bottom:0">
      <h2 style="margin-bottom:4px">Video Studio</h2>
      <p style="font-size:13px;color:var(--dim);margin:0 0 14px 0">Generate video scripts, browse the library, and copy CutSense CLI handoffs.</p>
      <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden">${pills}</div>
    </div>
    <div id="video-studio-content"></div>`;
  await _renderVideoStudioSubContent(sub);
}

async function switchVideoStudioSubtab(sub) {
  localStorage.setItem('tce_video_studio_subtab', sub);
  currentTab = 'video-studio';
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === 'video-studio'));
  await renderVideoStudio();
}

async function _renderVideoStudioSubContent(sub) {
  const c = document.getElementById('video-studio-content');
  if (!c) return;
  if (sub === 'walking') await _renderWalkingVideoFormInto(c);
  else if (sub === 'talking_head') await renderVideoLead(c);
  else await _renderVideoLibraryInto(c);
}

async function runWalkingVideo() {
  const topic = (document.getElementById('wv-topic')?.value || '').trim();
  if (!topic) { toast('Describe your topic first', false); return; }
  const duration = parseInt(document.getElementById('wv-duration')?.value || '90');
  const niche = (document.getElementById('wv-niche')?.value || 'general').trim() || 'general';
  const creatorId = document.getElementById('wv-creator')?.value || null;
  const notes = (document.getElementById('wv-notes')?.value || '').trim() || null;
  // If this run was kicked off from a Week Planner video-day card, pass the
  // calendar entry id so the backend links the script back to the calendar
  // row (so the card flips PLANNED -> READY after generation).
  let calendarEntryId = null;
  try {
    calendarEntryId = localStorage.getItem('tce_video_prefill_entry_id') || null;
    if (calendarEntryId) localStorage.removeItem('tce_video_prefill_entry_id');
  } catch (e) { /* ignore */ }
  const body = { topic, niche, duration_target_seconds: duration };
  if (creatorId) body.creator_inspiration_id = creatorId;
  if (notes) body.notes = notes;
  if (calendarEntryId) body.calendar_entry_id = calendarEntryId;
  const btn = document.getElementById('wv-run-btn');
  btn.disabled = true; btn.textContent = 'Starting...';
  walkingVideoStartTime = Date.now();
  localStorage.setItem('tce_walking_video_start', walkingVideoStartTime);
  try {
    const r = await api('/pipeline/start-walking-video', { method: 'POST', body: JSON.stringify(body) });
    walkingVideoRunId = r.run_id;
    localStorage.setItem('tce_walking_video_run', r.run_id);
    toast('Walking-video pipeline started: ' + r.run_id.substring(0, 8));
    pollWalkingVideoStatus();
    if (walkingVideoPollInterval) clearInterval(walkingVideoPollInterval);
    walkingVideoPollInterval = setInterval(pollWalkingVideoStatus, 3000);
    btn.textContent = 'Running...';
  } catch(e) {
    toast('Failed: ' + e.message, false);
    btn.disabled = false; btn.textContent = 'Generate Script';
  }
}

async function pollWalkingVideoStatus() {
  if (!walkingVideoRunId) return;
  try {
    const d = await api('/pipeline/start-walking-video/' + walkingVideoRunId + '/status');
    const statusEl = document.getElementById('wv-status');
    if (!statusEl) return;
    const elapsed = Math.round((Date.now() - walkingVideoStartTime) / 1000);
    const phase = d.phase || d.status || 'running';
    const detail = d.phase_detail || '';
    const done = phase === 'completed' || phase === 'failed';
    while (statusEl.firstChild) statusEl.removeChild(statusEl.firstChild);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cssText = 'padding:14px 16px;border-left:4px solid ' + (phase === 'failed' ? 'var(--red)' : phase === 'completed' ? 'var(--green)' : 'var(--accent)');
    const h = document.createElement('div');
    h.style.cssText = 'font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap';
    const hL = document.createElement('span'); hL.textContent = 'Phase: ' + phase;
    const hR = document.createElement('span');
    hR.style.cssText = 'font-weight:400;color:var(--dim);font-size:12px';
    hR.textContent = elapsed + 's elapsed' + (d.pipeline_run_id ? ' | run ' + String(d.pipeline_run_id).slice(0,8) : '');
    h.appendChild(hL); h.appendChild(hR); card.appendChild(h);
    if (detail) {
      const pd = document.createElement('div');
      pd.style.cssText = 'font-size:13px;color:var(--dim)';
      pd.textContent = detail;
      card.appendChild(pd);
    }
    if (d.error) {
      const err = document.createElement('pre');
      err.style.cssText = 'margin-top:8px;white-space:pre-wrap;font-size:12px;color:var(--red);background:var(--bg);padding:8px;border-radius:4px;max-height:200px;overflow:auto';
      err.textContent = String(d.error);
      card.appendChild(err);
    }
    statusEl.appendChild(card);
    if (done) {
      if (walkingVideoPollInterval) { clearInterval(walkingVideoPollInterval); walkingVideoPollInterval = null; }
      localStorage.removeItem('tce_walking_video_run');
      localStorage.removeItem('tce_walking_video_start');
      const btn = document.getElementById('wv-run-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Generate Script'; }
      if (phase === 'completed' && d.walking_video_script_id) {
        await _showWalkingVideoResult(d.walking_video_script_id);
      }
    }
  } catch(e) {
    if (window._tceShowErr) window._tceShowErr((e && e.message) || String(e), 'pollWalkingVideoStatus');
  }
}

  }
}

  section.className = 'section';

    const statusColor = s.status === 'approved' ? 'var(--green)' : s.status === 'published' ? 'var(--accent2,var(--accent))' : s.status === 'rejected' ? 'var(--red)' : 'var(--dim)';
    const tagKind = document.createElement('span');
    tagKind.textContent = s.kind === 'walking' ? 'Walking' : 'Talking-head';
    tagKind.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:var(--accent);margin-right:8px';
    const tagStatus = document.createElement('span');
    tagStatus.textContent = s.status;
    tagStatus.style.cssText = 'font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:' + statusColor;
    const tagRow = document.createElement('div');
    tagRow.style.cssText = 'margin-bottom:6px';
    tagRow.appendChild(tagKind); tagRow.appendChild(tagStatus);
    card.appendChild(tagRow);
    const title = document.createElement('div');
    title.style.cssText = 'font-weight:600;font-size:14px;margin-bottom:4px';
    title.textContent = s.title || '(Untitled)';
    card.appendChild(title);
    if (s.hook) {
      const hook = document.createElement('div');
      hook.style.cssText = 'font-size:12px;color:var(--dim);margin-bottom:6px;line-height:1.4';
      hook.textContent = s.hook.length > 140 ? s.hook.slice(0, 140) + '...' : s.hook;
      card.appendChild(hook);
    }
    const meta = document.createElement('div');
    meta.style.cssText = 'font-size:11px;color:var(--dim);display:flex;gap:10px;flex-wrap:wrap';
    const dur = s.estimated_duration_seconds ? Math.round(s.estimated_duration_seconds) + 's' : '?s';
    const wc = s.word_count ? s.word_count + ' words' : '';
    const d = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';
    meta.textContent = [dur, wc, s.niche, d].filter(Boolean).join(' | ');
    card.appendChild(meta);
    grid.appendChild(card);

  section.appendChild(grid);

async function _openScriptDetail(kind, id) {
  const container = document.getElementById('video-studio-content');
  if (!container) return;
  container.innerHTML = '<div class="section"><div class="empty" style="padding:24px;text-align:center">Loading...</div></div>';
  try {
    const script = await api('/video-scripts/' + kind + '/' + id);
    while (container.firstChild) container.removeChild(container.firstChild);
    const section = document.createElement('div');
    section.className = 'section';
    const back = document.createElement('button');
    back.className = 'btn btn-dim';
    back.textContent = '<- Back to Library';
    back.style.marginBottom = '12px';
    back.onclick = () => switchVideoStudioSubtab('library');

    _renderScriptDetailInto(section, script, { inline: false, kind });
    container.appendChild(section);
  } catch(e) {
    if (window._tceShowErr) window._tceShowErr((e && e.message) || String(e), '_openScriptDetail');
