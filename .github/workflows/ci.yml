name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tce
          POSTGRES_PASSWORD: tce
          POSTGRES_DB: tce
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/tce/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          TCE_DATABASE_URL: postgresql+asyncpg://tce:tce@localhost:5432/tce
          TCE_ANTHROPIC_API_KEY: sk-ant-test-placeholder
        run: pytest tests/ -v --tb=short
